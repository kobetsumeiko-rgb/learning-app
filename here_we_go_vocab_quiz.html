<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Here We Go! 英単語テスト</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:1rem}
.screen{display:none}.screen.active{display:block}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem;margin-bottom:12px}
select,input[type=text]{width:100%;padding:8px 12px;border:1px solid #d0d0d0;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
select:focus,input[type=text]:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,0.15)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:1px solid #d0d0d0;border-radius:8px;background:transparent;color:#1a1a1a;font-size:14px;cursor:pointer;transition:background .15s,transform .1s}
.btn:hover{background:#f0f0f0}.btn:active{transform:scale(0.98)}
.btn-primary{background:#EBF4FF;border-color:#378ADD;color:#1a6abf}
.btn-primary:hover{opacity:.85}
.btn-success{background:#EDFDF3;border-color:#34A853;color:#1e7e34}
label{font-size:13px;color:#666;display:block;margin-bottom:4px}
.choice-btn{padding:10px 12px;border:1px solid #d0d0d0;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:13px;text-align:left;transition:background .1s;width:100%}
.choice-btn:hover{background:#f5f5f5}
.choice-btn.selected{background:#EBF4FF;border-color:#378ADD;color:#1a6abf}
.q-word{font-size:22px;font-weight:500;margin-bottom:1.25rem}
.progress-bar{height:4px;background:#e5e5e5;border-radius:2px;margin-bottom:1rem;overflow:hidden}
.progress-fill{height:100%;background:#378ADD;border-radius:2px;transition:width .3s}
.result-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:12px;font-weight:500;flex-shrink:0;margin-top:1px}
.badge-ok{background:#EDFDF3;color:#1e7e34}
.badge-ng{background:#FEF2F2;color:#c0392b}
.score-big{font-size:36px;font-weight:500;margin:.5rem 0}
.nav{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
.nav-title{font-size:15px;font-weight:500;flex:1}
.q-dot{width:28px;height:28px;border-radius:50%;border:1px solid #d0d0d0;background:transparent;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:background .1s}
.q-dot.answered{background:#EDFDF3;border-color:#34A853;color:#1e7e34}
.q-dot.current{border-color:#378ADD;color:#1a6abf;font-weight:500}
.type-tab{display:flex;gap:8px;margin-bottom:1rem}
.ttab{flex:1;padding:10px;border:1px solid #d0d0d0;border-radius:8px;background:transparent;cursor:pointer;font-size:13px;color:#666;transition:all .15s}
.ttab.active{background:#EBF4FF;border-color:#378ADD;color:#1a6abf;font-weight:500}
.cnt-btn{padding:8px 12px;border:1px solid #d0d0d0;border-radius:8px;background:transparent;cursor:pointer;font-size:13px;color:#666;flex:1;transition:all .15s}
.cnt-btn.active{background:#EBF4FF;border-color:#378ADD;color:#1a6abf;font-weight:500}
input.spelling-input{font-size:18px;text-align:center;letter-spacing:.1em;padding:12px}
.hint{font-size:12px;color:#999;margin-top:6px;text-align:center}
.unit-block{border:1px solid #e5e5e5;border-radius:8px;margin-bottom:8px;overflow:hidden}
.unit-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f8f8f8;font-size:13px;font-weight:500}
.unit-header input[type=checkbox]{width:14px;height:14px;cursor:pointer;flex-shrink:0}
.part-list{padding:8px 12px;display:flex;flex-wrap:wrap;gap:6px}
.part-pill{padding:4px 10px;border:1px solid #d0d0d0;border-radius:20px;background:transparent;cursor:pointer;font-size:12px;color:#666;transition:all .15s;white-space:nowrap}
.part-pill.active{background:#EBF4FF;border-color:#378ADD;color:#1a6abf}
.sel-summary{font-size:12px;color:#888;margin-top:6px;min-height:16px}
.app-header{text-align:center;padding:1.5rem 0 .5rem}
.app-header h1{font-size:20px;font-weight:600;margin-bottom:4px}
.app-header p{font-size:13px;color:#888}
</style>
</head>
<body>
<div class="container">

<div class="app-header">
  <h1>Here We Go! 英単語テスト</h1>
  <p>光村図書 中学英語</p>
</div>

<div id="s-setup" class="screen active">
  <div class="card">
    <div style="font-size:13px;font-weight:500;color:#666;margin-bottom:.75rem">学年</div>
    <div style="display:flex;gap:8px">
      <button class="cnt-btn" id="g1btn" onclick="selGrade(1,this)">中学1年</button>
      <button class="cnt-btn active" id="g2btn" onclick="selGrade(2,this)">中学2年</button>
    </div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:500;color:#666;margin-bottom:.75rem">Unit・Part を選択（複数選択可）</div>
    <div id="unit-part-list"></div>
    <div class="sel-summary" id="sel-summary"></div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:500;color:#666;margin-bottom:.75rem">問題数</div>
    <div style="display:flex;gap:8px">
      <button class="cnt-btn active" onclick="selCount(10,this)">10問</button>
      <button class="cnt-btn" onclick="selCount(20,this)">20問</button>
      <button class="cnt-btn" onclick="selCount(0,this)">全問</button>
    </div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:500;color:#666;margin-bottom:.75rem">出題形式</div>
    <div class="type-tab">
      <button class="ttab active" onclick="selMode('choice',this)">和訳を10択</button>
      <button class="ttab" onclick="selMode('spell',this)">つづりを入力</button>
    </div>
    <div id="mode-hint" style="font-size:12px;color:#888">英単語を見て、正しい日本語訳を10択から選びます</div>
  </div>
  <div id="setup-warn" style="display:none;font-size:13px;color:#c0392b;margin-bottom:10px;padding:8px 12px;background:#FEF2F2;border-radius:8px"></div>
  <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" onclick="startQuiz()">
    <i class="ti ti-player-play"></i> テストを開始
  </button>
</div>

<div id="s-quiz" class="screen">
  <div class="nav">
    <button class="btn" onclick="goSetup()" style="padding:6px 10px"><i class="ti ti-arrow-left"></i></button>
    <span class="nav-title" id="quiz-title"></span>
    <span style="font-size:12px;color:#888" id="quiz-ctr"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div id="q-nav" style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:1rem"></div>
  <div class="card">
    <div style="font-size:12px;color:#888;margin-bottom:4px" id="q-num"></div>
    <div class="q-word" id="q-word"></div>
    <div id="q-body"></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn" onclick="prevQ()" id="btn-prev" style="flex:1;justify-content:center"><i class="ti ti-arrow-left"></i> 前へ</button>
    <button class="btn" onclick="nextQ()" id="btn-next" style="flex:1;justify-content:center">次へ <i class="ti ti-arrow-right"></i></button>
  </div>
  <button class="btn btn-success" id="btn-submit" onclick="submitQuiz()" style="width:100%;justify-content:center;padding:12px;margin-top:8px;display:none">
    <i class="ti ti-check"></i> 採点する
  </button>
</div>

<div id="s-result" class="screen">
  <div class="nav">
    <button class="btn" onclick="goSetup()" style="padding:6px 10px"><i class="ti ti-home"></i></button>
    <span class="nav-title">結果</span>
  </div>
  <div class="card" style="text-align:center">
    <div style="font-size:13px;color:#888">スコア</div>
    <div class="score-big" id="score-big"></div>
    <div style="font-size:13px;color:#888" id="score-pct"></div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:500;margin-bottom:.75rem">問題ごとの結果</div>
    <div id="result-list"></div>
  </div>
  <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;margin-top:4px" onclick="startQuiz()">
    <i class="ti ti-refresh"></i> もう一度
  </button>
</div>

</div><!-- /container -->

function guessPOS(ja){
  if(ja.match(/の過去形$|の複数形$|の原形$|の短縮形$|の過去分詞$/)) return 'verb';
  if(ja.match(/する$|れる$|える$|かる$|つ$|ぶ$|む$|く$|ぐ$|す$|いる$|ある$|てくる$|ていく$|ばす$|泣く$/)) return 'verb';
  if(ja.match(/^～/)) return 'prep';
  if(ja.match(/作られている/)) return 'other';
  if(ja.match(/しなければ|すべき|でしょう|してよい|していただ|しましょう|はいかが|できる（can|could not/)) return 'other';
  if(ja.match(/何|誰|どこ|全て|両方|もちろん|たとえば|私達自身|彼女自身/)) return 'other';
  if(ja.match(/い$/) && ja.length<=10) return 'adj';
  if(ja.match(/な$/) && ja.length<=10) return 'adj';
  if(ja.match(/た$/) && ja.length<=8) return 'adj';
  if(ja.match(/に$|く$/) && ja.length<=8) return 'adv';
  return 'noun';
}

      "Part 3":[["break","休憩"],["blow","～を飛ばす"],["blew","blowの過去形"]],
      "Goal":[["size","大きさ、サイズ"],["letter","文字"],["chose","chooseの過去形"]]
    },
    "Unit 8":{
      "Part 1":[["push","押す"],["design","デザインする"],["stage","舞台"],["role","役"],["argument","口論"],["costume","衣装"]],
      "Part 2":[["lose","失う"],["performance","公演、上演"],["sky","空"],["fix","修理する"],["sea","海"]],
      "Part 3":[["build","建てる"],["treasure","宝物"],["soft","柔らかい"],["taken","takeの過去分詞"],["built","buildの過去形、過去分詞"],["written","writeの過去分詞"],["made of","（見た目に分かる材料で）作られている"],["made from","（見た目に分からない原料で）作られている"]],
      "Goal":[["forever","永遠に"],["toward","～に対して"],["attitude","態度"]],
      "Active Grammar 8":[["create","創り出す（ゼロから生み出す）"]],
      "Let's Read 3":[["dictionary","辞書"],["difference","違い"],["fact","事実"],["conversation","会話"],["invent","発明する"],["various","さまざまな"],["hand","手"],["born","bearの過去分詞"],["tear","涙"],["careful","注意深い"],["culture","文化"],["propose","提案する"],["modern","現代の"],["meaning","意味"],["worldwide","世界中で"],["positive","前向きな"],["negative","後ろ向きな"]],
      "You can do it! 3":[["local","地元の"]],
      "Let's Read More 1":[["easily","簡単に"],["moment","瞬間、一瞬"],["paint","（ペンキなどを）塗る"],["real","本物の"],["shape","形状"],["candle","ろうそく"]],
      "Let's Read More 2":[["herself","彼女自身を"],["result","結果"],["chance","機会"],["recover","取り戻す"],["realize","はっきり認識する"],["land","土地"],["baby","赤ちゃん"],["cry","泣く"],["knew","knowの過去形"]]
    }
  }
};

const UNIT_ORDER={
  1:["Unit 1","Unit 2","Unit 3","Unit 4","Unit 5","Unit 6","Unit 7","Unit 8"],
  2:["Unit 1","Unit 2","Unit 3","Unit 4","Unit 5","Unit 6","Unit 7","Unit 8"]
};

let qGrade=2,qCount=10,qMode="choice";
let selectedParts={};
let questions=[],answers=[],curQ=0;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function selGrade(g,el){
  qGrade=g;selectedParts={};
  document.querySelectorAll('.cnt-btn[id^=g]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderUnitPartList();
}

function renderUnitPartList(){
  const wrap=document.getElementById('unit-part-list');wrap.innerHTML='';
  const units=(UNIT_ORDER[qGrade]||[]).filter(u=>WORDS[qGrade]&&WORDS[qGrade][u]);
  units.forEach(u=>{
    const parts=Object.keys(WORDS[qGrade][u]);
    const block=document.createElement('div');block.className='unit-block';
    const hdr=document.createElement('div');hdr.className='unit-header';
    const cb=document.createElement('input');cb.type='checkbox';
    cb.checked=parts.every(p=>selectedParts[u+'|'+p]);
    cb.onchange=()=>{parts.forEach(p=>{selectedParts[u+'|'+p]=cb.checked;});renderUnitPartList();updateSummary();};
    hdr.appendChild(cb);
    const lbl=document.createElement('span');lbl.textContent=u;hdr.appendChild(lbl);
    const cnt=document.createElement('span');cnt.style.cssText='margin-left:auto;font-size:11px;color:#888;font-weight:400';
    const sc=parts.filter(p=>selectedParts[u+'|'+p]).length;
    cnt.textContent=sc>0?`${sc}/${parts.length} Part選択中`:'';hdr.appendChild(cnt);
    block.appendChild(hdr);
    const plist=document.createElement('div');plist.className='part-list';
    parts.forEach(p=>{
      const key=u+'|'+p;
      const pill=document.createElement('button');pill.className='part-pill'+(selectedParts[key]?' active':'');
      pill.textContent=p;
      pill.onclick=()=>{
        selectedParts[key]=!selectedParts[key];
        pill.classList.toggle('active',selectedParts[key]);
        const allSel=parts.every(pp=>selectedParts[u+'|'+pp]);
        cb.checked=allSel;
        const sc2=parts.filter(pp=>selectedParts[u+'|'+pp]).length;
        cnt.textContent=sc2>0?`${sc2}/${parts.length} Part選択中`:'';
        updateSummary();
      };
      plist.appendChild(pill);
    });
    block.appendChild(plist);wrap.appendChild(block);
  });
  updateSummary();
}

function updateSummary(){
  const keys=Object.keys(selectedParts).filter(k=>selectedParts[k]);
  let total=0;
  keys.forEach(k=>{const[u,p]=k.split('|');total+=(WORDS[qGrade][u]&&WORDS[qGrade][u][p])?WORDS[qGrade][u][p].length:0;});
  document.getElementById('sel-summary').textContent=keys.length>0?`${keys.length}個のPartを選択中（合計 ${total} 語）`:'Partを選択してください';
}

function selCount(n,el){qCount=n;document.querySelectorAll('.cnt-btn:not([id^=g])').forEach(b=>b.classList.remove('active'));el.classList.add('active');}
function selMode(m,el){qMode=m;document.querySelectorAll('.ttab').forEach(b=>b.classList.remove('active'));el.classList.add('active');document.getElementById('mode-hint').textContent=m==='choice'?'英単語を見て、正しい日本語訳を10択から選びます':'日本語訳を見て、正しいつづりをキーボードで入力します';}

function getDummies(correct,count){
  const pos=guessPOS(correct);
  const allWords=[];
  Object.keys(WORDS).forEach(g=>Object.keys(WORDS[g]).forEach(u=>Object.keys(WORDS[g][u]).forEach(p=>{WORDS[g][u][p].forEach(w=>{if(w[1]!==correct)allWords.push(w[1]);});})));
  const samePOS=shuffle(allWords.filter(w=>guessPOS(w)===pos));
  const dummyPool=shuffle([...(DUMMY[pos]||DUMMY.noun)]);
  let opts=[...samePOS];
  for(const d of dummyPool){if(opts.length>=count+5)break;if(!opts.includes(d)&&d!==correct)opts.push(d);}
  const diffPOS=shuffle(allWords.filter(w=>guessPOS(w)!==pos));
  for(const d of diffPOS){if(opts.length>=count+5)break;if(!opts.includes(d))opts.push(d);}
  return shuffle(opts).slice(0,count);
}

function startQuiz(){
  const keys=Object.keys(selectedParts).filter(k=>selectedParts[k]);
  let pool=[];
  keys.forEach(k=>{const[u,p]=k.split('|');pool=pool.concat((WORDS[qGrade][u]&&WORDS[qGrade][u][p])||[]);});
  const warn=document.getElementById('setup-warn');
  if(!pool.length){warn.style.display='block';warn.textContent='Partが選択されていないか、単語が登録されていません。';return;}
  warn.style.display='none';
  pool=shuffle(pool);
  const n=qCount===0?pool.length:Math.min(qCount,pool.length);
  questions=pool.slice(0,n);answers=new Array(n).fill(null);curQ=0;
  const unitNames=[...new Set(keys.map(k=>k.split('|')[0]))];
  document.getElementById('quiz-title').textContent=unitNames.length===1?`中${qGrade} ${unitNames[0]}`:`中${qGrade}（${unitNames.length} Unit）`;
  showScreen('s-quiz');renderQ();
}

function showScreen(id){['s-setup','s-quiz','s-result'].forEach(s=>{document.getElementById(s).className='screen'+(s===id?' active':'');});}
function goSetup(){showScreen('s-setup');}

function renderQ(){
  const n=questions.length;
  document.getElementById('q-num').textContent=`問題 ${curQ+1} / ${n}`;
  document.getElementById('quiz-ctr').textContent=`${answers.filter(a=>a!==null&&a!=='').length}/${n} 回答済`;
  document.getElementById('prog-fill').style.width=(answers.filter(a=>a!==null&&a!=='').length/n*100)+'%';
  renderQNav();
  const q=questions[curQ],body=document.getElementById('q-body');body.innerHTML='';
  if(qMode==='choice'){
    document.getElementById('q-word').textContent=q[0];
    const correct=q[1];
    const dummies=getDummies(correct,9);
    const opts=shuffle([correct,...dummies]);
    const grid=document.createElement('div');grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px';
    opts.forEach(opt=>{const b=document.createElement('button');b.className='choice-btn'+(answers[curQ]===opt?' selected':'');b.textContent=opt;b.onclick=()=>{answers[curQ]=opt;renderQ();};grid.appendChild(b);});
    body.appendChild(grid);
  }else{
    document.getElementById('q-word').textContent=q[1];
    const inp=document.createElement('input');inp.type='text';inp.className='spelling-input';
    inp.placeholder='英語のつづりを入力…';inp.value=answers[curQ]||'';
    inp.oninput=()=>{answers[curQ]=inp.value.trim();updateNav();};
    body.appendChild(inp);
    const hint=document.createElement('div');hint.className='hint';hint.textContent=`ヒント：${q[0].length}文字`;
    body.appendChild(hint);
    setTimeout(()=>inp.focus(),50);
  }
  document.getElementById('btn-prev').disabled=curQ===0;
  document.getElementById('btn-next').style.display=curQ===n-1?'none':'flex';
  document.getElementById('btn-submit').style.display=answers.every(a=>a!==null&&a!=='')?'flex':'none';
}
function renderQNav(){
  const wrap=document.getElementById('q-nav');wrap.innerHTML='';
  questions.forEach((_,i)=>{const d=document.createElement('button');d.className='q-dot'+(answers[i]!==null&&answers[i]!==''?' answered':'')+(i===curQ?' current':'');d.textContent=i+1;d.onclick=()=>{curQ=i;renderQ();};wrap.appendChild(d);});
}
function updateNav(){
  document.getElementById('quiz-ctr').textContent=`${answers.filter(a=>a!==null&&a!=='').length}/${questions.length} 回答済`;
  document.getElementById('prog-fill').style.width=(answers.filter(a=>a!==null&&a!=='').length/questions.length*100)+'%';
  document.getElementById('btn-submit').style.display=answers.every(a=>a!==null&&a!=='')?'flex':'none';
  renderQNav();
}
function prevQ(){if(curQ>0){curQ--;renderQ();}}
function nextQ(){if(curQ<questions.length-1){curQ++;renderQ();}}

function submitQuiz(){
  let correct=0;
  const list=document.getElementById('result-list');list.innerHTML='';
  questions.forEach((q,i)=>{
    const ans=answers[i]||'',ok=qMode==='choice'?ans===q[1]:ans.toLowerCase()===q[0].toLowerCase();
    if(ok)correct++;
    const row=document.createElement('div');row.className='result-row';
    const badge=document.createElement('div');badge.className='badge '+(ok?'badge-ok':'badge-ng');
    badge.innerHTML=ok?'<i class="ti ti-check"></i>':'<i class="ti ti-x"></i>';
    const info=document.createElement('div');info.style.flex='1';
    info.innerHTML=qMode==='choice'
      ?`<div style="font-weight:500">${q[0]}</div><div style="font-size:12px;color:#888;margin-top:2px">あなたの答え：${ans}</div>`+(ok?'':` <div style="font-size:12px;color:#c0392b;margin-top:2px">正解：${q[1]}</div>`)
      :`<div style="font-weight:500">${q[1]}</div><div style="font-size:12px;color:#888;margin-top:2px">あなたの答え：${ans}</div>`+(ok?'':` <div style="font-size:12px;color:#c0392b;margin-top:2px">正解：${q[0]}</div>`);
    row.appendChild(badge);row.appendChild(info);list.appendChild(row);
  });
  const pct=Math.round(correct/questions.length*100);
  document.getElementById('score-big').textContent=`${correct} / ${questions.length}`;
  document.getElementById('score-pct').textContent=`正解率 ${pct}%`;
  showScreen('s-result');
}

// 初期化（デフォルト：中2）
document.getElementById('g2btn').classList.add('active');
document.getElementById('g1btn').classList.remove('active');
renderUnitPartList();
</script>
