<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地理 テスト対策</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  :root {
    --main: #2a2560;
    --main-light: #3d3890;
    --accent: #e8a020;
    --bg: #f5f4f0;
    --card: #fff;
    --border: #e0ddd6;
    --correct-bg: #f0fbf6;
    --correct-border: #4caf84;
    --essay-bg: #fff9f0;
    --essay-border: #e8a020;
    --tag-bold: #2a7be4;
    --tag-blank: #2a7be4;
    --tag-essay: #e8a020;
    --text: #1a1a2e;
    --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app-header { background: var(--main); color: #fff; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(42,37,96,0.3); }
  .app-header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.05em; }
  .app-header .subtitle { font-size: 11px; opacity: 0.75; margin-top: 2px; }
  .tabs { display: flex; background: var(--main); padding: 0 20px; border-bottom: 2px solid rgba(255,255,255,0.15); }
  .tab-btn { background: none; border: none; color: rgba(255,255,255,0.65); font-size: 13px; font-weight: 500; padding: 10px 16px 8px; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; font-family: inherit; }
  .tab-btn.active { color: #fff; border-bottom-color: var(--accent); }
  .chapter-scroll { background: #fff; padding: 10px 16px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
  .chapter-scroll::-webkit-scrollbar { height: 3px; }
  .chapter-scroll::-webkit-scrollbar-track { background: #f0f0f0; }
  .chapter-scroll::-webkit-scrollbar-thumb { background: var(--main); border-radius: 2px; }
  .chip { display: inline-block; padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: #fff; color: var(--muted); margin-right: 6px; transition: all 0.2s; white-space: nowrap; }
  .chip.active { background: var(--main); color: #fff; border-color: var(--main); }
  .content { max-width: 760px; margin: 0 auto; padding: 16px; }
  .score-bar { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .score-label { font-size: 12px; color: var(--muted); }
  .score-num { font-size: 14px; font-weight: 700; color: var(--main); }
  .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 12px; }
  .summary-card h2 { font-size: 15px; font-weight: 700; color: var(--main); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid var(--main); }
  .summary-text { font-size: 13.5px; line-height: 1.85; color: var(--text); }
  .keyword-list { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .keyword-tag { background: #eef1fc; color: var(--main); font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 12px; border: 1px solid #c5caee; }
  .qa-controls { display: flex; justify-content: flex-end; margin-bottom: 10px; }
  .toggle-all-btn { background: var(--main); color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.2s; }
  .toggle-all-btn:hover { background: var(--main-light); }
  .qa-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; transition: box-shadow 0.2s; }
  .qa-card.essay { border-left: 4px solid var(--essay-border); }
  .qa-card:hover { box-shadow: 0 2px 8px rgba(42,37,96,0.08); }
  .qa-header { display: flex; align-items: flex-start; gap: 8px; }
  .qa-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; color: #fff; flex-shrink: 0; margin-top: 2px; }
  .qa-tag.bold, .qa-tag.blank { background: var(--tag-bold); }
  .qa-tag.essay { background: var(--tag-essay); }
  .qa-question { font-size: 13.5px; font-weight: 500; line-height: 1.7; flex: 1; }
  .show-btn { width: 100%; background: #f2f1ee; border: 1px dashed #bbb; border-radius: 8px; padding: 8px; font-size: 12px; color: var(--muted); cursor: pointer; margin-top: 10px; font-family: inherit; transition: all 0.2s; }
  .show-btn:hover { background: #e8e7e4; }
  .qa-answer { margin-top: 8px; padding: 10px 12px; border-radius: 8px; font-size: 13px; line-height: 1.7; font-weight: 500; display: none; }
  .qa-answer.visible { display: block; }
  .qa-answer.normal { background: var(--correct-bg); border: 1px solid var(--correct-border); color: #1a6644; }
  .qa-answer.essay-ans { background: var(--essay-bg); border: 1px solid var(--essay-border); color: #7a4a00; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .chapter-title-qa { font-size: 13px; font-weight: 700; color: var(--main); margin-bottom: 12px; padding: 8px 12px; background: #eef1fc; border-radius: 8px; border-left: 4px solid var(--main); }
  .qa-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
  .filter-btn { background: #fff; color: var(--muted); border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .filter-btn.active { background: #fff3e0; color: #b35c00; border-color: var(--accent); }
  .mark-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 2px 4px; line-height: 1; opacity: 0.3; transition: opacity 0.2s, transform 0.15s; flex-shrink: 0; }
  .mark-btn.marked { opacity: 1; transform: scale(1.15); }
  .qa-card.marked-card { border-color: #f5c842; background: #fffdf0; }
  .no-review-msg { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .tts-bar { background: var(--main); border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .tts-btn { background: rgba(255,255,255,0.15); border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; padding: 7px 14px; cursor: pointer; font-family: inherit; transition: background 0.2s; display: flex; align-items: center; gap: 5px; }
  .tts-btn:hover { background: rgba(255,255,255,0.28); }
  .tts-btn:disabled { opacity: 0.4; cursor: default; }
  .tts-btn.primary { background: #fff; color: var(--main); }
  .tts-btn.primary:hover { background: #eee; }
  .tts-speed { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .speed-chip { background: rgba(255,255,255,0.15); border: none; border-radius: 6px; color: rgba(255,255,255,0.75); font-size: 11px; font-weight: 600; padding: 5px 10px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .speed-chip.active { background: var(--accent); color: #fff; }
  .tts-status { color: rgba(255,255,255,0.8); font-size: 11px; width: 100%; margin-top: 2px; min-height: 16px; }
  .tts-highlight { background: #fff9c4 !important; border-color: #f5c842 !important; box-shadow: 0 0 0 2px #f5c842; }
</style>
</head>
<body>
<div class="app-header">
  <h1>🌍 地理 テスト対策</h1>
  <div class="subtitle">要約 ＋ 一問一答</div>
</div>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('summary', this)">📖 要約</button>
  <button class="tab-btn" onclick="switchTab('qa', this)">✏️ 一問一答</button>
</div>
<div class="chapter-scroll" id="chapterScroll"></div>
<div class="content">
  <div class="tab-panel active" id="tab-summary"><div id="summaryContent"></div></div>
  <div class="tab-panel" id="tab-qa">
    <div class="score-bar">
      <span class="score-label">総問数</span><span class="score-num" id="totalCount">0</span>
      <span class="score-label" style="margin-left:16px">確認済み</span><span class="score-num" id="checkedCount">0</span>
    </div>
    <div class="tts-bar">
      <button class="tts-btn primary" id="ttsPlayBtn" onclick="ttsPlay()">▶ 再生</button>
      <button class="tts-btn" id="ttsPauseBtn" onclick="ttsPause()" disabled>⏸ 一時停止</button>
      <button class="tts-btn" id="ttsStopBtn" onclick="ttsStop()" disabled>⏹ 停止</button>
      <div class="tts-speed">
        <button class="speed-chip active" id="speed1x" onclick="setSpeed(1.0)">標準</button>
        <button class="speed-chip" id="speed05x" onclick="setSpeed(0.5)">0.5×</button>
      </div>
      <div class="tts-status" id="ttsStatus">再生ボタンで読み上げ開始</div>
    </div>
    <div class="qa-controls">
      <button class="filter-btn" id="filterBtn" onclick="toggleFilter()">⭐ 復習問題のみ</button>
      <button class="toggle-all-btn" id="toggleAllBtn" onclick="toggleAllAnswers()">すべての答えを表示</button>
    </div>
    <div id="qaContent"></div>
  </div>
</div>
<script>
const summaries = [
  {
    title: "① 地球上の位置と私たちの生活",
    text: "地球の表面は陸地と海洋からなり、フランス付近を中心に見ると陸地が最大になる陸半球、ニュージーランド沖を中心に見ると海洋が最大になる水半球に分けられる。地球上の絶対的な位置は緯度と経度で表す。緯度は赤道を0度として南北を各90度に分けたもので、同じ緯度の地点を結んだ線を緯線という。経度はイギリス・ロンドン郊外の旧グリニッジ天文台を通る本初子午線（経度0度）を基準に東西各180度に分けたもので、同じ経度の地点を結んだ線を経線という。地球の自転軸（地軸）は公転面に対して23.4度傾いており、北回帰線・南回帰線・白夜・極夜などの現象が生じる。",
    keywords: ["陸半球","水半球","緯度","経度","緯線","経線","本初子午線","北回帰線","南回帰線","白夜","極夜"]
  },
  {
    title: "② 時差と私たちの生活",
    text: "地球は自転によって1日（24時間）でほぼ1回転（360度）するため、経度15度ごとに1時間の時差が生じる。1884年に本初子午線がグリニッジ標準時（GMT）として国際的な時刻の基準に定められると、各国・地域は標準時子午線を定めて国内の標準時のもととした。日本の標準時子午線は兵庫県明石市を通る東経135度である。1日分の時間差を調整するため、経度180度の線を中心に日付変更線が設定されている。中国のように東西に広い国でも単一の標準時を採用している場合があり、地域によって生活時間が異なることもある。",
    keywords: ["時差","グリニッジ標準時（GMT）","標準時","日付変更線"]
  },
  {
    title: "③ 地球儀と地図",
    text: "地球の模型である地球儀は、距離・面積の比率・角度・方位などの要素がいずれも正しく表現されている。一方、球面である地球表面を平面の地図で表すとひずみが生じる。平面の地図では地図投影法（図法）が用いられる。角度を正しく表すメルカトル図法は等角航路を示し、海図として利用される。距離と方位を正しく表す正距方位図法は大圏航路（大圏コース）が直線で表される。面積を正しく表すホモロサイン図法（グード図法）はサンソン図法とモルワイデ図法を接合した正積図である。",
    keywords: ["地球儀","ひずみ","地図投影法（図法）","メルカトル図法","等角航路","正距方位図法","大圏航路","正積図","サンソン図法","モルワイデ図法","ホモロサイン図法"]
  },
  {
    title: "④ 身の回りの地図",
    text: "地形や気候などの自然環境、人口・土地利用・産業などの社会環境に関わる情報を地球上の位置と結びつけたものを地理情報という。地図はその目的から主題図と一般図に分けられる。主題図は観光案内図や鉄道路線図のように特定のテーマを強調した地図であり、一般図は地形図などの基本的な地理情報が盛り込まれた地図である。縮尺によって表示される範囲や情報が異なり、現在は電子国土基本図が整備され、地理院地図としてインターネット上に公開されている。",
    keywords: ["地理情報","主題図","一般図","地形図","縮尺","電子国土基本図","地理院地図"]
  },
  {
    title: "⑤ 統計地図の種類と利用",
    text: "人口や生産量などの統計データ、気温や降水量などの観測データを地図上に表した主題図を統計地図という。統計地図には、数量を点の多さで表すドットマップ、等しい値の地点を線で結ぶ等値線図、図形の大小や線の太さで表す図形表現図、移動を線で表す流線図、階級に区分して色分けする階級区分図（コロプレスマップ）、等面積メッシュに区切るメッシュマップ、地図を変形させたカルトグラム（変形地図）などがある。複数の統計地図を比較することで地域の特徴や変化を読み取ることができる。",
    keywords: ["統計地図","ドットマップ","等値線図","図形表現図","流線図","階級区分図","メッシュマップ","カルトグラム"]
  },
  {
    title: "⑥ 地理情報システム（GIS）の利用",
    text: "地図データに位置情報をもった各種データを重ね合わせる技術を地理情報システム（GIS）という。GISにはGPSや日本のみちびきなどに代表される全球測位衛星システム（GNSS）、地上から離れた所から陸上・海洋・大気などを観測・探査するリモートセンシング（遠隔探査）などの技術が支えている。日々膨大に生成・記録されるビッグデータもGISで可視化できるようになり、交通渋滞の緩和や企業のマーケティングなど様々な場面で活用されている。",
    keywords: ["地理情報システム（GIS）","全球測位衛星システム（GNSS）","リモートセンシング","ビッグデータ","GPS"]
  },
  {
    title: "⑦ 現代世界の国家",
    text: "国と国との境界線を国境といい、山脈や河川などの自然の地形に沿った自然的国境と、緯線や経線・建造物などを利用した人為的国境がある。国家は主権・領域・国民の三つの要素から成り立つ。領域は領土・領海・領空からなる。領海の外側には接続水域があり、さらにその外側に排他的経済水域（EEZ）がある。他国から干渉されずに政治を行える国を独立国といい、主権をもたない非独立地域を植民地、それを支配する国を宗主国という。1960年はアフリカの17か国が独立したアフリカの年とよばれる。",
    keywords: ["国境","自然的国境","人為的国境","主権","領域","領土","領海","領空","国民","接続水域","排他的経済水域（EEZ）","独立国","植民地","宗主国","アフリカの年"]
  },
  {
    title: "⑧ 日本の位置と領域",
    text: "日本はユーラシア大陸の東の海上に位置する島国で、領土面積は約38万km²（世界第61位）だが、領海と排他的経済水域の合計は約447万km²と世界有数の広さをもつ。これは数多くの島々が広範囲に存在するためで、南端の沖ノ鳥島が北回帰線より南にも領域を広げている。海底の大陸棚には天然ガスなどの資源が存在する。現在の領土は1951年のサンフランシスコ平和条約で定められたが、北方領土（ロシアが不法占拠）、竹島（韓国が不法占拠）、尖閣諸島（領有権問題なし）などの課題がある。",
    keywords: ["大陸棚","サンフランシスコ平和条約","北方領土","竹島","尖閣諸島"]
  },
  {
    title: "⑨ 国家間の結びつき",
    text: "冷戦終結後もロシアのウクライナ侵攻によって北大西洋条約機構（NATO）の加盟国が増えるなど、新たな緊張が生まれている。国家どうしの関係が複雑になるなかで、国際連合（国連）の果たす役割が重要になっている。現在193か国が加盟し、持続可能な開発目標（SDGs）に向けた取り組みでも中心的役割を担う。経済のグローバル化が進み、ヨーロッパ連合（EU）・東南アジア諸国連合（ASEAN）・USMCA・MERCOSUR・APECなど地域ごとの経済的結びつきが重要になっている。",
    keywords: ["NATO","国際連合（国連）","SDGs","EU","ASEAN","USMCA","MERCOSUR","APEC"]
  },
  {
    title: "⑩ 貿易によって結びつく世界",
    text: "私たちの生活は外国からの輸入品なしでは成り立たず、金融や娯楽などのサービス貿易の割合も拡大している。かつて先進国と発展途上国の貿易は垂直分業の関係にあったが、新興国の台頭により水平分業へ移行し、互いの強みを生かした国際分業が進んでいる。貿易の自由化のため、GATTを引き継ぐ世界貿易機関（WTO）が設立された。特定の国や地域間の自由貿易協定（FTA）や、より広い分野で連携する経済連携協定（EPA）も増え、CPTPP・RCEPなどの協定が結ばれている。",
    keywords: ["サービス貿易","先進国","発展途上国","新興国","垂直分業","水平分業","国際分業","保護貿易","WTO","FTA","知的財産権","EPA","CPTPP","RCEP"]
  },
];

const qaData = [
  // 第1章
  [
    {type:"bold", q:"フランス付近を中心に地球を眺めたとき、陸地の割合が最大になる半球を何というか。", a:"陸半球"},
    {type:"bold", q:"ニュージーランド沖を中心に地球を眺めたとき、海洋の割合が最大になる半球を何というか。", a:"水半球"},
    {type:"bold", q:"地球上のある地点の南北の位置を表す座標を何というか。", a:"緯度"},
    {type:"bold", q:"地球上のある地点の東西の位置を表す座標を何というか。", a:"経度"},
    {type:"bold", q:"赤道を0度として南北それぞれ90度に分けた、同じ緯度の地点を結んだ線を何というか。", a:"緯線"},
    {type:"bold", q:"本初子午線を基準に東西それぞれ180度に分けた、同じ経度の地点を結んだ線を何というか。", a:"経線"},
    {type:"bold", q:"イギリス・ロンドン郊外の旧グリニッジ天文台を通る、経度0度の経線を何というか。", a:"本初子午線"},
    {type:"bold", q:"北半球の夏至に太陽が真上を通る、北緯23.4度の緯線を何というか。", a:"北回帰線"},
    {type:"bold", q:"北半球の冬至に太陽が真上を通る、南緯23.4度の緯線を何というか。", a:"南回帰線"},
    {type:"bold", q:"北極圏・南極圏で夏に太陽が沈まず、一晩中暗くならない現象を何というか。", a:"白夜"},
    {type:"bold", q:"北極圏・南極圏で冬に一日中太陽が昇らない現象を何というか。", a:"極夜"},
    {type:"blank", q:"本初子午線から東側の180度までが（　）、西側の180度までが（　）である。", a:"東経・西経"},
    {type:"blank", q:"赤道から北の範囲を（　）、南の範囲を（　）という。", a:"北半球・南半球"},
    {type:"blank", q:"地球の自転軸（地軸）は、公転面に対する垂直方向から約（　）度傾いている。", a:"23.4（23度26分）"},

// ===== TTS =====
let ttsSpeed = 1.0;
let ttsPlaying = false;
let ttsPaused = false;
let ttsAbort = false;
let ttsCurrentUtterance = null;
let ttsResolve = null;

function setSpeed(s) {
  ttsSpeed = s;
  document.getElementById('speed1x').classList.toggle('active', s === 1.0);
  document.getElementById('speed05x').classList.toggle('active', s === 0.5);
}

function speak(text) {
  return new Promise((resolve) => {
    if (ttsAbort) { resolve('abort'); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = ttsSpeed;
    ttsCurrentUtterance = u;
    ttsResolve = resolve;
    u.onend = () => resolve('done');
    u.onerror = () => resolve('error');
    speechSynthesis.speak(u);
  });
}

function wait(ms) {
  return new Promise((resolve) => {
    if (ttsAbort) { resolve(); return; }
    const id = setInterval(() => {
      if (ttsAbort) { clearInterval(id); resolve(); return; }
      if (!ttsPaused) { clearInterval(id); resolve(); }
    }, 100);
    setTimeout(() => { clearInterval(id); resolve(); }, ms + 5000); // safety
  });
}

async function ttsPlay() {
  if (ttsPaused) {
    // 一時停止から再開
    ttsPaused = false;
    speechSynthesis.resume();
    ttsUpdateUI(true);
    return;
  }
  if (ttsPlaying) return;

  ttsAbort = false;
  ttsPaused = false;
  ttsPlaying = true;
  ttsUpdateUI(true);

  const items = filterMode
    ? (qaData[currentChapter] || []).map((item, i) => ({item, i})).filter(({i}) => markedSet.has(`qa-${currentChapter}-${i}`))
    : (qaData[currentChapter] || []).map((item, i) => ({item, i}));

  for (let idx = 0; idx < items.length; idx++) {
    if (ttsAbort) break;
    const {item, i} = items[idx];
    const id = `qa-${currentChapter}-${i}`;
    const card = document.getElementById(`card-${id}`);

    // ハイライト
    document.querySelectorAll('.qa-card').forEach(c => c.classList.remove('tts-highlight'));
    if (card) {
      card.classList.add('tts-highlight');
      card.scrollIntoView({behavior: 'smooth', block: 'center'});
    }

    const qNum = `第${idx+1}問。`;
    const qText = item.q.replace(/（　）/g, 'ここに入る語句は').replace(/【チャレンジ】/g, '');
    document.getElementById('ttsStatus').textContent = `問題 ${idx+1}/${items.length}：読み上げ中…`;

    await speak(qNum + qText);
    if (ttsAbort) break;

    // 3秒ポーズ（一時停止考慮）
    document.getElementById('ttsStatus').textContent = `問題 ${idx+1}/${items.length}：考え中… (3秒)`;
    await wait(3000);
    if (ttsAbort) break;

    // 答えを表示してから読み上げ
    const ans = document.getElementById(`ans-${id}`);
    const btn = document.getElementById(`btn-${id}`);
    if (ans) { ans.classList.add('visible'); if(btn) btn.textContent = '隠す'; }

    document.getElementById('ttsStatus').textContent = `問題 ${idx+1}/${items.length}：答え読み上げ中…`;
    await speak('答えは、' + item.a);
    if (ttsAbort) break;

    await wait(1000);
  }

  document.querySelectorAll('.qa-card').forEach(c => c.classList.remove('tts-highlight'));
  ttsPlaying = false;
  ttsPaused = false;
  ttsAbort = false;
  document.getElementById('ttsStatus').textContent = ttsAbort ? '停止しました' : '読み上げ完了！';
  ttsUpdateUI(false);
}

function ttsPause() {
  if (!ttsPlaying) return;
  if (ttsPaused) {
    ttsPaused = false;
    speechSynthesis.resume();
    document.getElementById('ttsPauseBtn').textContent = '⏸ 一時停止';
    document.getElementById('ttsStatus').textContent = '再開しました';
  } else {
    ttsPaused = true;
    speechSynthesis.pause();
    document.getElementById('ttsPauseBtn').textContent = '▶ 再開';
    document.getElementById('ttsStatus').textContent = '一時停止中…';
  }
}

function ttsStop() {
  ttsAbort = true;
  ttsPaused = false;
  ttsPlaying = false;
  speechSynthesis.cancel();
  document.querySelectorAll('.qa-card').forEach(c => c.classList.remove('tts-highlight'));
  document.getElementById('ttsStatus').textContent = '停止しました';
  ttsUpdateUI(false);
}

function ttsUpdateUI(playing) {
  document.getElementById('ttsPlayBtn').disabled = playing && !ttsPaused;
  document.getElementById('ttsPauseBtn').disabled = !playing;
  document.getElementById('ttsStopBtn').disabled = !playing;
  if (!playing) {
    document.getElementById('ttsPauseBtn').textContent = '⏸ 一時停止';
    document.getElementById('ttsPlayBtn').disabled = false;
  }
}

  localStorage.setItem(MARK_KEY, JSON.stringify([...markedSet]));

  scroll.innerHTML = summaries.map((s, i) => {

    return `<span class="chip ${i===currentChapter?'active':''}" onclick="selectChapter(${i})">${s.title}${badge}</span>`;
  }).join('');
}

  document.getElementById('totalCount').textContent = items.length;
  document.getElementById('checkedCount').textContent = [...markedSet].filter(k => k.startsWith(`qa-${currentChapter}-`)).length;

  // フィルターボタンの見た目
  const filterBtn = document.getElementById('filterBtn');
  if (filterMode) {
    filterBtn.classList.add('active');
    filterBtn.textContent = '⭐ 復習問題のみ（表示中）';
  } else {
    filterBtn.classList.remove('active');
    filterBtn.textContent = '⭐ 復習問題のみ';
  }

  if (filterMode && displayItems.length === 0) {
    document.getElementById('qaContent').innerHTML = `
      <div class="no-review-msg">⭐ この章に復習マークした問題はありません</div>`;
    return;
  }

  document.getElementById('qaContent').innerHTML = `
    <div class="chapter-title-qa">${summaries[currentChapter].title}${filterMode ? '　⭐ 復習モード' : ''}</div>
    ${displayItems.map(({item, i}) => {
      const id = `qa-${currentChapter}-${i}`;
      const isEssay = item.type === 'essay';
      const tagLabel = item.type === 'bold' ? '太字' : item.type === 'blank' ? '空所' : '記述';
      const isMarked = markedSet.has(id);
      return `
        <div class="qa-card ${isEssay?'essay':''} ${isMarked?'marked-card':''}" id="card-${id}">
          <div class="qa-header">
            <span class="qa-tag ${item.type}">${tagLabel}</span>
            <div class="qa-question">${item.q}</div>
            <button class="mark-btn ${isMarked?'marked':''}" id="mark-${id}" onclick="toggleMark('${id}')" title="復習マーク">⭐</button>
          </div>
          <button class="show-btn" id="btn-${id}" onclick="toggleAnswer('${id}')">答えを見る</button>
          <div class="qa-answer ${isEssay?'essay-ans':'normal'}" id="ans-${id}">${item.a}</div>
        </div>`;
    }).join('')}`;
}

function toggleMark(id) {
  if (markedSet.has(id)) {
    markedSet.delete(id);
  } else {
    markedSet.add(id);
  }
  saveMarks();
  const card = document.getElementById(`card-${id}`);
  const btn = document.getElementById(`mark-${id}`);
  const isMarked = markedSet.has(id);
  btn.classList.toggle('marked', isMarked);
  card.classList.toggle('marked-card', isMarked);
  // チップのバッジ更新
  renderChips();
  // 確認済み数更新
  document.getElementById('checkedCount').textContent =
    [...markedSet].filter(k => k.startsWith(`qa-${currentChapter}-`)).length;
  // 復習モード中に外したら再描画
  if (filterMode) renderQA();
}

function toggleFilter() {
  filterMode = !filterMode;
  allVisible = false;
  document.getElementById('toggleAllBtn').textContent = 'すべての答えを表示';
  renderQA();
}

function toggleAnswer(id) {
  const ans = document.getElementById(`ans-${id}`);
  const btn = document.getElementById(`btn-${id}`);
  if (!ans) return;
  const visible = ans.classList.contains('visible');
  if (visible) { ans.classList.remove('visible'); btn.textContent = '答えを見る'; }
  else { ans.classList.add('visible'); btn.textContent = '隠す'; }
}

function toggleAllAnswers() {
  allVisible = !allVisible;
  const items = qaData[currentChapter] || [];
  items.forEach((_, i) => {
    const id = `qa-${currentChapter}-${i}`;
    const ans = document.getElementById(`ans-${id}`);
    const btn = document.getElementById(`btn-${id}`);
    if (!ans) return;
    if (allVisible) { ans.classList.add('visible'); btn.textContent = '隠す'; }
    else { ans.classList.remove('visible'); btn.textContent = '答えを見る'; }
  });
  document.getElementById('toggleAllBtn').textContent = allVisible ? 'すべての答えを隠す' : 'すべての答えを表示';
}

function selectChapter(i) {
  ttsStop();
  currentChapter = i;
  allVisible = false;
  filterMode = false;
  document.getElementById('toggleAllBtn').textContent = 'すべての答えを表示';
  document.getElementById('ttsStatus').textContent = '再生ボタンで読み上げ開始';
  renderChips();
  renderSummary();
  renderQA();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  btn.classList.add('active');
}

renderChips();
renderSummary();
renderQA();
</script>
</body>
</html>
