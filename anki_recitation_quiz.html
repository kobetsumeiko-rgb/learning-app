<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗唱テスト練習 - A family from Thailand</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f5f0;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:720px;margin:0 auto;background:#fff;border-radius:16px;padding:2rem;box-shadow:0 1px 4px rgba(0,0,0,.08)}
h1{font-size:20px;font-weight:500;color:#1a1a1a;margin-bottom:0.25rem}
.subtitle{font-size:14px;color:#888;margin-bottom:1.5rem}
.level-btns{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.lbtn{padding:8px 20px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#333;font-size:14px;cursor:pointer;transition:all .15s}
.lbtn:hover{background:#f0f0f0}
.lbtn.active{background:#e6f1fb;color:#185fa5;border-color:#378add}
.passage{font-size:17px;line-height:2.4;color:#1a1a1a;background:#f8f8f6;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.blank-input{display:inline-block;border:none;border-bottom:2px solid #378add;background:transparent;color:#185fa5;font-size:17px;font-family:sans-serif;text-align:center;outline:none;padding:0 2px;min-width:40px;vertical-align:baseline}
.blank-input.correct{border-bottom-color:#1D9E75;color:#0F6E56}
.blank-input.wrong{border-bottom-color:#E24B4A;color:#A32D2D;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.actions{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.btn{padding:8px 20px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#333;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn:hover{background:#f0f0f0}
.btn.primary{background:#e6f1fb;color:#185fa5;border-color:#378add}
.btn.primary:hover{background:#cde3f6}
.score{font-size:14px;color:#888;display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.score span{font-size:20px;font-weight:500;color:#1a1a1a}
.hint{font-size:12px;color:#aaa;margin-top:0.5rem}
</style>
</head>
<body>
<div class="wrap">
  <h1>暗唱テスト練習</h1>
  <p class="subtitle">A family from Thailand（教科書 Unit 3）</p>
  <div class="level-btns">
    <button class="lbtn" onclick="setLevel(10,this)">Lv.1　10空欄</button>
    <button class="lbtn" onclick="setLevel(20,this)">Lv.2　20空欄</button>
    <button class="lbtn" onclick="setLevel(30,this)">Lv.3　30空欄</button>
    <button class="lbtn" onclick="setLevel(40,this)">Lv.4　40空欄</button>
    <button class="lbtn" onclick="setLevel(50,this)">Lv.5　50空欄</button>
    <button class="lbtn" onclick="setLevel(60,this)">Lv.6　60空欄</button>
    <button class="lbtn" onclick="setLevel(70,this)">Lv.7　70空欄</button>
    <button class="lbtn" onclick="setLevel(80,this)">Lv.8　80空欄</button>
    <button class="lbtn" onclick="setLevel(90,this)">Lv.9　90空欄</button>
    <button class="lbtn active" onclick="setLevel(100,this)">Lv.10　全部</button>
  </div>
  <div class="passage" id="passage"></div>
  <div class="actions">
    <button class="btn primary" onclick="checkAll()"><i class="ti ti-check"></i> 全部チェック</button>
    <button class="btn" onclick="revealAll()"><i class="ti ti-eye"></i> 答えを見る</button>
    <button class="btn" onclick="resetAll()"><i class="ti ti-refresh"></i> リセット</button>
  </div>
  <div class="score">正解: <span id="correct-count">-</span> / <span id="total-count">-</span></div>
  <p class="hint">空欄をクリックして入力 → Enterで次へ進めます</p>
</div>

<script>
const sentences = [
  {words:["Japan","is","a","perfect","destination","for","family","vacations","."]},
  {words:["First",",","the","Japanese","hospitality","is","wonderful","."]},
  {words:["When","we","visited","hotels",",","restaurants",",","and","tourist","attractions",",","the","staff","were","always","warm","and","friendly","."]},
  {words:["Additionally",",","Japan","is","a","very","safe","country","."]},
  {words:["One","evening",",","we","went","to","a","local","festival","."]},
  {words:["Our","children","walked","around","without","any","worries","about","safety","."]},
  {words:["Our","son","bought","a","snow","cone","by","himself","while","we","played","a","shooting","game","."]},
  {words:["Finally",",","people","keep","public","places","such","as","parks","and","streets","clean","."]},
  {words:["Everything","was","so","clean","and","organized","that","we","were","really","impressed","."]},
  {words:["One","day",",","when","we","were","waiting","for","our","Shinkansen",",","the","cleaning","staff","suddenly","arrived","."]},
  {words:["We","were","surprised","that","they","cleaned","the","whole","train","in","such","a","short","time","."]},
  {words:["We","are","very","glad","that","we","visited","this","country","."]},
  {words:["Our","children","will","never","forget","this","wonderful","week","in","Japan","."]}
];

const stopWords = /^(a|an|the|to|of|in|by|as|we|our|and|or|for|so|that|was|is|are|were|they|them|when|one|two|but|its|it|had|has|be|do|did|not|no|on|at|if|up|my|me|he|she|him|her|his|you|your|who|how|any|all|can)$/i;

const wordOnly = [];
sentences.forEach(s => s.words.forEach(w => { if(!/^[.,]$/.test(w)) wordOnly.push(w); }));

const TOTAL_WORDS = wordOnly.length;

let currentLevel = 100;
let blankedIndices = new Set();

function pickIndices(n){
  const clamped = Math.min(n, TOTAL_WORDS);
  // priority: content words (length>2, not stopword)
  let priorities = [...Array(TOTAL_WORDS).keys()].filter(i => wordOnly[i].length > 2 && !stopWords.test(wordOnly[i]));
  priorities = priorities.sort(() => Math.random() - 0.5);
  const result = new Set(priorities.slice(0, clamped));
  if(result.size < clamped){
    const rest = [...Array(TOTAL_WORDS).keys()].filter(i => !result.has(i));
    rest.sort(() => Math.random() - 0.5).slice(0, clamped - result.size).forEach(i => result.add(i));
  }
  return result;
}

function setLevel(n, el){
  currentLevel = n;
  document.querySelectorAll('.lbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render(){
  const actual = Math.min(currentLevel, TOTAL_WORDS);
  blankedIndices = pickIndices(actual);
  const passage = document.getElementById('passage');
  let wordIdx = 0;
  let html = '';
  sentences.forEach((s, si) => {
    s.words.forEach(w => {
      if(/^[.,]$/.test(w)){
        html += w + ' ';
      } else {
        const idx = wordIdx;
        if(blankedIndices.has(idx)){
          const len = Math.max(w.length * 11, 44);
          html += `<input class="blank-input" data-answer="${w}" data-idx="${idx}" style="width:${len}px" placeholder="___" onkeydown="handleKey(event,${idx})"> `;
        } else {
          html += w + ' ';
        }
        wordIdx++;
      }
    });
    if(si < sentences.length - 1) html += '<br>';
  });
  passage.innerHTML = html;
  document.getElementById('correct-count').textContent = '-';
  document.getElementById('total-count').textContent = actual;
}

function handleKey(e, idx){
  if(e.key === 'Enter'){
    const input = e.target;
    const val = input.value.trim().toLowerCase();
    const ans = input.dataset.answer.toLowerCase();
    if(val === ans){ input.classList.add('correct'); input.classList.remove('wrong'); }
    else if(val !== ''){ input.classList.add('wrong'); input.classList.remove('correct'); setTimeout(()=>input.classList.remove('wrong'),400); }
    const inputs = Array.from(document.querySelectorAll('.blank-input'));
    const next = inputs[inputs.indexOf(input)+1];
    if(next) next.focus();
  }
}

function checkAll(){
  let correct = 0;
  document.querySelectorAll('.blank-input').forEach(input => {
    const val = input.value.trim().toLowerCase();
    const ans = input.dataset.answer.toLowerCase();
    if(val === ans){ input.classList.add('correct'); input.classList.remove('wrong'); correct++; }
    else if(val !== ''){ input.classList.add('wrong'); input.classList.remove('correct'); }
  });
  document.getElementById('correct-count').textContent = correct;
}

function revealAll(){
  document.querySelectorAll('.blank-input').forEach(input => {
    input.value = input.dataset.answer;
    input.classList.add('correct');
    input.classList.remove('wrong');
  });
  document.getElementById('correct-count').textContent = Math.min(currentLevel, TOTAL_WORDS);
}

function resetAll(){ render(); }

render();
</script>
</body>
</html>
