<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公共 テスト対策｜長野工業高校 1年 1学期期末考査</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --primary: #2a2560;
    --primary-light: #3d3a8a;
    --accent: #e8a020;
    --bg: #f5f4f0;
    --card-bg: #ffffff;
    --border: #e0ddd6;
    --text: #1a1a2e;
    --text-muted: #666;
    --tag-blank: #2a6dd9;
    --tag-essay: #e07020;
    --correct-bg: #f0fbf6;
    --correct-border: #34c07a;
    --essay-bg: #fff9f0;
    --star-active: #f5b400;
    --highlight: #fffbe6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--primary);
    color: white;
    padding: 14px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(42,37,96,0.3);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .header-top h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .subject-badge {
    background: var(--accent);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.05em;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
  }
  .tab-btn {
    padding: 8px 18px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab-btn.active {
    color: white;
    border-bottom-color: var(--accent);
  }

  /* ── CHAPTER CHIPS ── */
  .chapter-bar {
    background: white;
    padding: 10px 16px;
    overflow-x: auto;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    scrollbar-width: none;
  }
  .chapter-bar::-webkit-scrollbar { display: none; }
  .chapter-chip {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .chapter-chip.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  /* ── SCORE BAR ── */
  .score-bar {
    display: flex;
    gap: 12px;
    padding: 10px 16px;
    background: white;
    border-bottom: 1px solid var(--border);
  }
  .score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 56px;
  }
  .score-label {
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .score-value {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--primary);
  }
  .score-divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  /* ── FILTER + TTS BAR ── */
  .control-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--bg);
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 5px 14px;
    border-radius: 16px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.18s;
  }
  .filter-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .tts-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
  }
  .tts-btn {
    padding: 5px 12px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.18s;
  }
  .tts-btn:hover { background: #f0f0f0; }
  .tts-btn.playing {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .speed-toggle {
    padding: 5px 10px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: inherit;
  }

  /* ── MAIN CONTENT ── */
  .main { padding: 16px; max-width: 800px; margin: 0 auto; }

  /* ── QUESTION CARDS ── */
  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .card.starred {
    border-color: var(--star-active);
    box-shadow: 0 0 0 1px rgba(245,180,0,0.3);
  }
  .card.tts-active {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(42,37,96,0.2);
    background: var(--highlight);
  }
  .card-essay {
    border-left: 4px solid var(--tag-essay);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 14px 14px 10px;
  }
  .star-btn {
    background: none;
    border: none;
    font-size: 1.1rem;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
    color: var(--border);
    transition: color 0.15s, transform 0.15s;
    margin-top: 1px;
  }
  .star-btn.active { color: var(--star-active); }
  .star-btn:hover { transform: scale(1.2); }

  .card-body { flex: 1; }
  .card-tags { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .tag {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 8px;
    letter-spacing: 0.04em;
  }
  .tag-blank { background: #dbeafe; color: #1d4ed8; }
  .tag-essay { background: #fde8cc; color: #b45309; }

  .question-text {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
  }
  .blank {
    display: inline-block;
    min-width: 60px;
    border-bottom: 2px solid var(--primary);
    color: transparent;
    background: #e8e7f5;
    border-radius: 3px;
    padding: 0 4px;
    user-select: none;
  }
  .blank.revealed {
    color: var(--primary);
    background: #dbeafe;
    font-weight: 700;
  }

  /* ── ANSWER AREA ── */
  .answer-area {
    padding: 0 14px 14px 38px;
  }
  .reveal-btn {
    padding: 6px 16px;
    border-radius: 8px;
    border: 1.5px solid var(--primary);
    background: white;
    color: var(--primary);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.18s;
  }
  .reveal-btn:hover {
    background: var(--primary);
    color: white;
  }
  .answer-box {
    display: none;
    margin-top: 8px;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--correct-bg);
    border: 1px solid var(--correct-border);
    font-size: 0.88rem;
    line-height: 1.65;
    color: #1a6040;
    font-weight: 500;
  }
  .answer-box.essay-answer {
    background: var(--essay-bg);
    border-color: var(--tag-essay);
    color: #7c4a10;
  }
  .answer-box.show { display: block; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* ── CHAPTER TITLE ── */
  .chapter-title-card {
    background: var(--primary);
    color: white;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chapter-title-card .ch-num {
    font-size: 1.8rem;
    font-weight: 700;
    opacity: 0.4;
    font-family: 'Georgia', serif;
    line-height: 1;
  }
  .chapter-title-card .ch-name {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.4;
  }
  .chapter-title-card .ch-count {
    margin-left: auto;
    font-size: 0.75rem;
    opacity: 0.7;
    white-space: nowrap;
  }

  /* ── PRINT STYLES ── */
  @media print {
    /* ヘッダー・コントロール類を非表示 */
    header, .chapter-bar, .score-bar, .control-bar,
    .reveal-btn, .answer-box, .star-btn { display: none !important; }

    body { background: white; }

    .main {
      padding: 8px;
      max-width: 100%;
    }

    /* 章タイトルカード */
    .chapter-title-card {
      background: white !important;
      color: #2a2560 !important;
      border: 2px solid #2a2560;
      padding: 8px 14px;
      margin-bottom: 10px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .chapter-title-card .ch-num { color: #2a2560 !important; opacity: 1; }

    /* カード */
    .card {
      border: 1px solid #999;
      border-radius: 4px;
      margin-bottom: 8px;
      page-break-inside: avoid;
    }
    .card.starred { border-color: #999 !important; box-shadow: none !important; }
    .card-essay { border-left: 3px solid #e07020 !important; }

    /* タグ */
    .tag-blank { background: #dbeafe !important; color: #1d4ed8 !important;
      -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .tag-essay { background: #fde8cc !important; color: #b45309 !important;
      -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    /* 空欄：背景なし・下線のみ・文字は透明のまま */
    .blank {
      background: transparent !important;
      border-bottom: 1.5px solid #333 !important;
      border-radius: 0 !important;
      min-width: 80px !important;
      color: transparent !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    /* 答えを開いた後の空欄（revealed）は答えを印刷しない */
    .blank.revealed {
      background: transparent !important;
      color: transparent !important;
      border-bottom: 1.5px solid #333 !important;
    }

    /* 問題番号を自動付与 */
    .card { counter-increment: question; }
    .card-body::before {
      content: "Q" counter(question) "　";
      font-weight: 700;
      font-size: 0.75rem;
      color: #2a2560;
    }
    .main { counter-reset: question; }

    /* フォントサイズ調整 */
    .question-text { font-size: 0.88rem; line-height: 1.8; }
    .card-tags { margin-bottom: 4px; }
    .card-header { padding: 10px 10px 6px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>公共 <span style="font-size:0.75rem;font-weight:400;opacity:0.85;">長野工業高校 1年 1学期期末考査対策</span></h1>
    <span class="subject-badge">一問一答</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('quiz')">✏️ 一問一答</button>
  </div>
</header>

<!-- Chapter chips -->
<div class="chapter-bar" id="chapterBar"></div>

<!-- Score bar -->
<div class="score-bar">
  <div class="score-item">
    <span class="score-label">問</span>
    <span class="score-value" id="scoreTotal">0</span>
  </div>
  <div class="score-divider"></div>
  <div class="score-item">
    <span class="score-label">確認済み</span>
    <span class="score-value" id="scoreChecked">0</span>
  </div>
  <div class="score-divider"></div>
  <div class="score-item">
    <span class="score-label">⭐ マーク</span>
    <span class="score-value" id="scoreStarred">0</span>
  </div>
</div>

<!-- Control bar -->
<div class="control-bar">
  <button class="filter-btn active" id="filterAll" onclick="setFilter('all')">すべて</button>
  <button class="filter-btn" id="filterStar" onclick="setFilter('star')">⭐ マークのみ</button>
  <div class="tts-controls">
    <button class="tts-btn" id="ttsPlay" onclick="ttsPlay()">▶ 読み上げ</button>
    <button class="tts-btn" id="ttsPause" onclick="ttsPause()">⏸</button>
    <button class="tts-btn" onclick="ttsStop()">⏹</button>
    <button class="speed-toggle" id="speedBtn" onclick="toggleSpeed()">標準</button>
  </div>
</div>

<!-- Main -->
<div class="main" id="mainContent"></div>

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let currentChapter = 0;
let filterMode = 'all'; // 'all' | 'star'
let checkedSet = new Set();
let ttsQueue = [];
let ttsIndex = 0;
let ttsPlaying = false;
let ttsPaused = false;
let ttsSpeed = 1.0;
let currentUtterance = null;
let ttsActiveCard = null;

// localStorage keys
const LS_STARS = 'koukyou_stars_v1';
const LS_CHECKED = 'koukyou_checked_v1';

function loadStars() {
  try { return JSON.parse(localStorage.getItem(LS_STARS) || '{}'); } catch { return {}; }
}
function saveStars(stars) {
  localStorage.setItem(LS_STARS, JSON.stringify(stars));
}
function starKey(chapterIdx, qIdx) { return `${chapterIdx}_${qIdx}`; }

// ════════════════════════════════════════════
// CHAPTER BAR
// ════════════════════════════════════════════
function buildChapterBar() {
  const bar = document.getElementById('chapterBar');
  bar.innerHTML = '';
  chapterLabels.forEach((label, i) => {
    const chip = document.createElement('button');
    chip.className = 'chapter-chip' + (i === currentChapter ? ' active' : '');
    chip.textContent = label;
    chip.onclick = () => { currentChapter = i; ttsStop(); render(); };
    bar.appendChild(chip);
  });
}

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function render() {
  buildChapterBar();
  const stars = loadStars();
  const qs = qaData[currentChapter] || [];

  // Filter
  const visible = qs.map((q, i) => ({ q, i })).filter(({ i }) => {
    if (filterMode === 'star') return !!stars[starKey(currentChapter, i)];
    return true;
  });

  // Score
  document.getElementById('scoreTotal').textContent = visible.length;
  document.getElementById('scoreChecked').textContent = [...checkedSet].filter(k => {
    const [c] = k.split('_'); return parseInt(c) === currentChapter;
  }).length;
  const starCount = Object.keys(stars).filter(k => k.startsWith(currentChapter + '_')).length;
  document.getElementById('scoreStarred').textContent = starCount;

  const main = document.getElementById('mainContent');
  if (visible.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="icon">⭐</div><p>マークした問題がありません</p></div>`;
    return;
  }

  // Chapter title
  let html = `<div class="chapter-title-card">
    <span class="ch-num">${currentChapter + 1}</span>
    <span class="ch-name">${chapterLabels[currentChapter].replace(/^[①-⑦]/, '')}</span>
    <span class="ch-count">${visible.length}問</span>
  </div>`;

  visible.forEach(({ q, i }) => {
    const key = starKey(currentChapter, i);
    const isStarred = !!stars[key];
    const isChecked = checkedSet.has(`${currentChapter}_${i}`);
    const isEssay = q.type === 'essay';

    // Format question text: 【　】→ blank spans
    let qText = q.q.replace(/【　】/g, `<span class="blank" data-card="${currentChapter}_${i}">　　　</span>`);

    const tagHtml = isEssay
      ? `<span class="tag tag-essay">記述</span>`
      : `<span class="tag tag-blank">空所</span>`;

    const answerBoxClass = isEssay ? 'answer-box essay-answer' + (isChecked ? ' show' : '') : 'answer-box' + (isChecked ? ' show' : '');

    html += `<div class="card${isStarred ? ' starred' : ''}${isEssay ? ' card-essay' : ''}" id="card_${currentChapter}_${i}" data-idx="${i}">
      <div class="card-header">
        <button class="star-btn${isStarred ? ' active' : ''}" onclick="toggleStar(${currentChapter},${i})" title="マーク">★</button>
        <div class="card-body">
          <div class="card-tags">${tagHtml}</div>
          <div class="question-text">${qText}</div>
        </div>
      </div>
      <div class="answer-area">
        <button class="reveal-btn" onclick="revealAnswer(${currentChapter},${i})">答えを確認</button>
        <div class="${answerBoxClass}" id="ans_${currentChapter}_${i}">${escHtml(q.a)}</div>
      </div>
    </div>`;
  });

  main.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ════════════════════════════════════════════
// ANSWER REVEAL
// ════════════════════════════════════════════
function revealAnswer(chapter, idx) {
  const ansBox = document.getElementById(`ans_${chapter}_${idx}`);
  if (!ansBox) return;
  ansBox.classList.add('show');
  // Reveal blanks
  const card = document.getElementById(`card_${chapter}_${idx}`);
  const blanks = card.querySelectorAll(`.blank[data-card="${chapter}_${idx}"]`);
  const answers = qaData[chapter][idx].a.split('／');
  blanks.forEach((b, bi) => {
    b.classList.add('revealed');
    b.textContent = answers[bi] || answers[0];
  });
  checkedSet.add(`${chapter}_${idx}`);
  updateScores();
}

function updateScores() {
  const stars = loadStars();
  const qs = qaData[currentChapter] || [];
  const visible = qs.map((q, i) => ({ q, i })).filter(({ i }) => {
    if (filterMode === 'star') return !!stars[starKey(currentChapter, i)];
    return true;
  });
  document.getElementById('scoreTotal').textContent = visible.length;
  document.getElementById('scoreChecked').textContent = [...checkedSet].filter(k => {
    const [c] = k.split('_'); return parseInt(c) === currentChapter;
  }).length;
  const starCount = Object.keys(stars).filter(k => k.startsWith(currentChapter + '_')).length;
  document.getElementById('scoreStarred').textContent = starCount;
}

// ════════════════════════════════════════════
// STAR
// ════════════════════════════════════════════
function toggleStar(chapter, idx) {
  const stars = loadStars();
  const key = starKey(chapter, idx);
  if (stars[key]) delete stars[key];
  else stars[key] = 1;
  saveStars(stars);
  render();
}

// ════════════════════════════════════════════
// FILTER
// ════════════════════════════════════════════
function setFilter(mode) {
  filterMode = mode;
  document.getElementById('filterAll').classList.toggle('active', mode === 'all');
  document.getElementById('filterStar').classList.toggle('active', mode === 'star');
  ttsStop();
  render();
}

// ════════════════════════════════════════════
// TTS
// ════════════════════════════════════════════
function buildTtsQueue() {
  const stars = loadStars();
  const qs = qaData[currentChapter] || [];
  ttsQueue = qs.map((q, i) => ({ q, i })).filter(({ i }) => {
    if (filterMode === 'star') return !!stars[starKey(currentChapter, i)];
    return true;
  });
}

function ttsPlay() {
  if (!('speechSynthesis' in window)) { alert('このブラウザは読み上げ非対応です'); return; }
  if (ttsPaused && ttsPlaying) {
    window.speechSynthesis.resume();
    ttsPaused = false;
    document.getElementById('ttsPlay').classList.add('playing');
    return;
  }
  ttsStop();
  buildTtsQueue();
  ttsIndex = 0;
  ttsPlaying = true;
  ttsPaused = false;
  document.getElementById('ttsPlay').classList.add('playing');
  speakNext();
}

// ── Web Audio API で「ピロン」効果音を生成 ──
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBlankSound(onEnd) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 1047; // チーン（C6・鈴の音）
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 1.3);
    // onEndはsetTimeoutのみで1回だけ呼ぶ（osc.onendedとの二重呼び出しを防ぐ）
    setTimeout(onEnd, 700);
  } catch(e) { onEnd(); }
}

// 問題文を【　】で分割し、テキスト読み上げ→効果音→テキスト…と順番に処理
function speakQuestionWithBlanks(text, onEnd) {
  const parts = text.split(/【　】/);
  let idx = 0;
  function next() {
    if (!ttsPlaying) return;
    if (idx >= parts.length) { onEnd(); return; }
    const part = parts[idx].trim();
    idx++;
    if (part === '') {
      // 空パート（文頭・文末の空欄）→効果音だけ
      if (idx < parts.length) {
        playBlankSound(next);
      } else {
        onEnd();
      }
    } else {
      speakText(part, () => {
        if (!ttsPlaying) return;
        // まだ後に空欄がある？
        if (idx < parts.length) {
          playBlankSound(next);
        } else {
          onEnd();
        }
      });
    }
  }
  next();
}

function speakNext() {
  if (!ttsPlaying || ttsIndex >= ttsQueue.length) {
    ttsStop(); return;
  }
  const { q, i } = ttsQueue[ttsIndex];
  // highlight card
  if (ttsActiveCard) ttsActiveCard.classList.remove('tts-active');
  ttsActiveCard = document.getElementById(`card_${currentChapter}_${i}`);
  if (ttsActiveCard) {
    ttsActiveCard.classList.add('tts-active');
    ttsActiveCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  // 問題文を空欄で区切りながら読み上げ（空欄部分はピロン効果音）
  speakQuestionWithBlanks(q.q, () => {
    // 3秒待機してから答えを表示・読み上げ
    setTimeout(() => {
      if (!ttsPlaying) return;
      revealAnswer(currentChapter, i);
      speakText('こたえ。' + q.a, () => {
        ttsIndex++;
        setTimeout(speakNext, 1000);
      });
    }, 3000);
  });
}

function speakText(text, onEnd) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = ttsSpeed;
  u.onend = onEnd;
  currentUtterance = u;
  window.speechSynthesis.speak(u);
}

function ttsPause() {
  if (ttsPlaying && !ttsPaused) {
    window.speechSynthesis.pause();
    ttsPaused = true;
    document.getElementById('ttsPlay').classList.remove('playing');
  }
}

function ttsStop() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  ttsPlaying = false;
  ttsPaused = false;
  if (ttsActiveCard) { ttsActiveCard.classList.remove('tts-active'); ttsActiveCard = null; }
  document.getElementById('ttsPlay').classList.remove('playing');
}

function toggleSpeed() {
  if (ttsSpeed === 1.0) {
    ttsSpeed = 0.5;
    document.getElementById('speedBtn').textContent = '0.5×';
  } else {
    ttsSpeed = 1.0;
    document.getElementById('speedBtn').textContent = '標準';
  }
}

function switchTab(tab) {}
