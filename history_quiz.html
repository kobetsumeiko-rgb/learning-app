<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歴史テスト対策 — 要約＆一問一答</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: #f5f4f0; color: #1a1a1a; font-size: 15px; line-height: 1.7; min-height: 100vh;
}
header { background: #2a2560; color: #fff; padding: 1.5rem 1.25rem 1.25rem; }
header h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.03em; }
header p { font-size: 12px; opacity: 0.65; margin-top: 4px; }
.tabs {
  display: flex; background: #fff; border-bottom: 1px solid #e0ddd6;
  position: sticky; top: 0; z-index: 10;
}
.tab {
  flex: 1; padding: 12px 8px; font-size: 14px; font-weight: 500;
  text-align: center; cursor: pointer; border: none; background: none;
  color: #888; border-bottom: 3px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.tab.active { color: #2a2560; border-bottom-color: #2a2560; }
.main { padding: 1rem; max-width: 680px; margin: 0 auto; }
.chapter-scroll {
  display: flex; gap: 8px; overflow-x: auto;
  padding-bottom: 4px; margin-bottom: 1.25rem; scrollbar-width: none;
}
.chapter-scroll::-webkit-scrollbar { display: none; }
.chip {
  white-space: nowrap; padding: 5px 14px; border-radius: 20px;
  border: 1px solid #ccc; font-size: 12px; cursor: pointer;
  background: #fff; color: #555; font-weight: 500;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.chip.active { background: #2a2560; color: #fff; border-color: #2a2560; }
.summary-card {
  background: #fff; border-radius: 12px; border: 1px solid #e0ddd6;
  padding: 1.25rem; margin-bottom: 1rem;
}
.summary-card h2 { font-size: 15px; font-weight: 500; color: #2a2560; margin-bottom: 0.75rem; }
.summary-text { font-size: 14px; color: #333; line-height: 1.85; }
.keywords { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 1rem; }
.kw { background: #eeedf8; color: #2a2560; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 500; }
.qa-controls { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.reveal-btn {
  font-size: 13px; padding: 5px 14px; border-radius: 20px;
  border: 1px solid #ccc; background: #fff; color: #555; cursor: pointer; font-weight: 500;
}
.reveal-btn:hover { background: #f0eff8; }
.score-row { display: flex; gap: 12px; margin-bottom: 1rem; }
.score-card { flex: 1; background: #fff; border: 1px solid #e0ddd6; border-radius: 10px; padding: 12px; text-align: center; }
.score-card .num { font-size: 22px; font-weight: 500; color: #2a2560; }
.score-card .lbl { font-size: 11px; color: #888; margin-top: 2px; }
.qa-item {
  background: #fff; border: 1px solid #e0ddd6;
  border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px;
}
.qa-item.essay { border-left: 4px solid #e8a020; }
.qa-q { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 8px; }
.qa-q-num {
  display: inline-block; background: #2a2560; color: #fff;
  border-radius: 4px; font-size: 11px; padding: 1px 6px;
  margin-right: 6px; font-weight: 500; vertical-align: 1px;
}
.qa-q-num.essay-num { background: #e8a020; }
.qa-tag {
  display: inline-block; font-size: 10px; padding: 1px 6px;
  border-radius: 3px; margin-right: 6px; vertical-align: 2px; font-weight: 500;
}
.tag-blank { background: #eeedf8; color: #2a2560; }
.tag-essay { background: #fff4e0; color: #a06010; }
.ans-btn {
  font-size: 12px; padding: 4px 12px; border-radius: 20px;
  border: 1px solid #ccc; background: #f5f4f0; color: #666; cursor: pointer;
}
.ans-btn:hover { background: #eeedf8; }
.qa-answer {
  display: none; margin-top: 8px; padding: 8px 12px;
  background: #f0fbf6; border-radius: 8px; font-size: 14px;
  font-weight: 500; color: #0f6e56; border-left: 3px solid #1d9e75;
}
.qa-answer.essay-ans {
  background: #fff9f0; color: #7a4e10; border-left-color: #e8a020;
  font-weight: 400; line-height: 1.8;
}
.qa-answer.show { display: block; }

/* ★ マークボタン */
.mark-btn {
  font-size: 18px; background: none; border: none; cursor: pointer;
  padding: 0 4px; line-height: 1; color: #ccc;
  transition: color 0.15s, transform 0.1s;
  vertical-align: middle;
}
.mark-btn.marked { color: #f5a623; }
.mark-btn:active { transform: scale(1.3); }

/* マーク済みカードの強調 */
.qa-item.marked-card { border-color: #f5a623; background: #fffdf5; }
.qa-item.marked-card.essay { border-left-color: #e8a020; }

/* 現在読み上げ中カードのハイライト */
.qa-item.speaking { outline: 2px solid #2a2560; outline-offset: 2px; }

/* フィルター行 */
.filter-row {
  display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center;
}
.filter-btn {
  font-size: 12px; padding: 4px 12px; border-radius: 20px;
  border: 1px solid #ccc; background: #fff; color: #555; cursor: pointer; font-weight: 500;
  transition: background 0.12s, color 0.12s;
}
.filter-btn.active { background: #f5a623; color: #fff; border-color: #f5a623; }

/* 音声プレイヤーパネル */
.audio-panel {
  background: #fff; border: 1px solid #e0ddd6; border-radius: 12px;
  padding: 12px 16px; margin-bottom: 1rem;
}
.audio-panel-title {
  font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 500;
}
.audio-controls {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.audio-play-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: #2a2560; color: #fff; border: none; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
.audio-play-btn:hover { background: #1e1a4a; }
.audio-play-btn:disabled { background: #bbb; cursor: not-allowed; }
.audio-stop-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: #f5f4f0; color: #555; border: 1px solid #ccc; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
.audio-stop-btn:hover { background: #e0ddd6; }
.audio-progress {
  font-size: 12px; color: #555; min-width: 60px;
}
.audio-speed-group {
  display: flex; gap: 4px; margin-left: auto;
}
.speed-btn {
  font-size: 11px; padding: 3px 10px; border-radius: 12px;
  border: 1px solid #ccc; background: #f5f4f0; color: #555; cursor: pointer; font-weight: 500;
}
.speed-btn.active { background: #2a2560; color: #fff; border-color: #2a2560; }
.audio-status {
  font-size: 11px; color: #2a2560; margin-top: 6px; min-height: 16px;
  font-weight: 500;
}
</style>
</head>
<body>

<header>
  <h1>歴史テスト対策</h1>
  <p>要約 &amp; 一問一答（太字語句・空所補充・記述）</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('summary', this)">📖 要約</button>
  <button class="tab" onclick="showTab('qa', this)">✏️ 一問一答</button>
</div>

<div class="main">
  <div id="tab-summary">
    <div class="chapter-scroll" id="summary-chips"></div>
    <div id="summary-content"></div>
  </div>
  <div id="tab-qa" style="display:none">
    <div class="chapter-scroll" id="qa-chips"></div>

    <!-- 音声プレイヤー -->
    <div class="audio-panel">
      <div class="audio-panel-title">🔊 読み上げ（問題 → 3秒 → 答え）</div>
      <div class="audio-controls">
        <button class="audio-play-btn" id="audio-play-btn" onclick="togglePlay()" title="再生／一時停止">▶</button>
        <button class="audio-stop-btn" onclick="stopAudio()" title="停止">■</button>
        <span class="audio-progress" id="audio-progress">－ / －</span>
        <div class="audio-speed-group">
          <button class="speed-btn active" id="speed-normal" onclick="setSpeed(1.0)">標準</button>
          <button class="speed-btn" id="speed-half" onclick="setSpeed(0.5)">0.5×</button>
        </div>
      </div>
      <div class="audio-status" id="audio-status"></div>
    </div>

    <!-- フィルター -->
    <div class="filter-row">
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">すべて</button>
      <button class="filter-btn" id="filter-marked" onclick="setFilter('marked')">⭐ マークのみ</button>
    </div>

    <div class="qa-controls">
      <button class="reveal-btn" onclick="revealAll()">すべての答えを表示</button>
      <button class="reveal-btn" onclick="hideAll()">すべて隠す</button>
    </div>
    <div class="score-row">
      <div class="score-card"><div class="num" id="total-q">0</div><div class="lbl">問</div></div>
      <div class="score-card"><div class="num" id="shown-q">0</div><div class="lbl">確認済み</div></div>
      <div class="score-card"><div class="num" id="marked-q">0</div><div class="lbl">⭐ マーク</div></div>
    </div>
    <div id="qa-content"></div>
  </div>
</div>

// ========== マーク管理 ==========
let markedSet = new Set(JSON.parse(localStorage.getItem('markedQuestions') || '[]'));
function saveMarks() {
  localStorage.setItem('markedQuestions', JSON.stringify([...markedSet]));
}

// ========== フィルター・章管理 ==========
let currentChapter = -1;
let currentFilter = 'all'; // 'all' | 'marked'

// ========== 音声管理 ==========
let speechItems = [];       // 現在表示中の問題リスト（{q, a, domIndex}）
let speechIndex = 0;        // 何問目を読み上げ中か
let isSpeaking = false;     // 再生中フラグ
let isPaused = false;       // 一時停止フラグ
let speechRate = 1.0;       // 読み上げ速度
let pauseTimer = null;      // 3秒待機タイマー
let currentUtterance = null;

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function setSpeed(rate) {
  speechRate = rate;
  document.getElementById('speed-normal').classList.toggle('active', rate === 1.0);
  document.getElementById('speed-half').classList.toggle('active', rate === 0.5);
  // 再生中なら再起動
  if (isSpeaking && !isPaused) {
    const idx = speechIndex;
    stopAudio();
    speechIndex = idx;
    isSpeaking = true;
    isPaused = false;
    speakCurrent();
  }
}

function buildSpeechItems() {
  const items = getFilteredItems();
  speechItems = items.map((item, di) => ({
    q: stripHtml(item.q),
    a: stripHtml(item.a),
    domIndex: di
  }));
}

function togglePlay() {
  if (!isSpeaking && !isPaused) {
    // 新規再生
    buildSpeechItems();
    if (speechItems.length === 0) return;
    speechIndex = 0;
    isSpeaking = true;
    isPaused = false;
    speakCurrent();
  } else if (isSpeaking && !isPaused) {
    // 一時停止
    window.speechSynthesis.cancel();
    clearTimeout(pauseTimer);
    isPaused = true;
    isSpeaking = false;
    updateAudioUI();
  } else if (isPaused) {
    // 再開（問題の頭から再開）
    isSpeaking = true;
    isPaused = false;
    speakCurrent();
  }
}

function stopAudio() {
  window.speechSynthesis.cancel();
  clearTimeout(pauseTimer);
  isSpeaking = false;
  isPaused = false;
  speechIndex = 0;
  highlightSpeaking(-1);
  updateAudioUI();
}

function speakCurrent() {
  if (!isSpeaking || speechIndex >= speechItems.length) {
    // 全問終了
    stopAudio();
    document.getElementById('audio-status').textContent = '✅ 読み上げ完了';
    return;
  }
  const item = speechItems[speechIndex];
  highlightSpeaking(item.domIndex);
  updateAudioUI();

  // 問題を読む
  const uQ = new SpeechSynthesisUtterance(item.q);
  uQ.lang = 'ja-JP';
  uQ.rate = speechRate;
  currentUtterance = uQ;
  document.getElementById('audio-status').textContent = `Q${speechIndex + 1} 問題を読み上げ中…`;

  uQ.onend = () => {
    if (!isSpeaking) return;
    // 3秒待機してから答えへ
    document.getElementById('audio-status').textContent = `Q${speechIndex + 1} 考え中… (3秒)`;
    pauseTimer = setTimeout(() => {
      if (!isSpeaking) return;
      const uA = new SpeechSynthesisUtterance(item.a);
      uA.lang = 'ja-JP';
      uA.rate = speechRate;
      currentUtterance = uA;
      document.getElementById('audio-status').textContent = `Q${speechIndex + 1} 答えを読み上げ中…`;
      // 答えを画面に自動表示
      const ansEl = document.getElementById('ans-' + item.domIndex);
      const ansBtn = ansEl ? ansEl.previousElementSibling : null;
      if (ansEl && !ansEl.classList.contains('show')) {
        ansEl.classList.add('show');
        if (ansBtn && ansBtn.classList.contains('ans-btn')) ansBtn.textContent = '隠す';
        updateScore();
      }
      uA.onend = () => {
        if (!isSpeaking) return;
        speechIndex++;
        pauseTimer = setTimeout(() => {
          speakCurrent();
        }, 800);
      };
      window.speechSynthesis.speak(uA);
    }, 3000);
  };
  window.speechSynthesis.speak(uQ);
}

function highlightSpeaking(domIndex) {
  document.querySelectorAll('.qa-item').forEach((el, i) => {
    el.classList.toggle('speaking', i === domIndex);
  });
  if (domIndex >= 0) {
    const el = document.querySelectorAll('.qa-item')[domIndex];
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function updateAudioUI() {
  const btn = document.getElementById('audio-play-btn');
  const progress = document.getElementById('audio-progress');
  if (isSpeaking && !isPaused) {
    btn.textContent = '⏸';
  } else if (isPaused) {
    btn.textContent = '▶';
    document.getElementById('audio-status').textContent = '⏸ 一時停止中';
  } else {
    btn.textContent = '▶';
    if (!document.getElementById('audio-status').textContent.includes('完了')) {
      document.getElementById('audio-status').textContent = '';
    }
  }
  const total = speechItems.length || getFilteredItems().length;
  progress.textContent = isSpeaking ? `${speechIndex + 1} / ${total}` : `－ / ${total}`;
}

// ========== フィルター ==========
function setFilter(f) {
  currentFilter = f;
  document.getElementById('filter-all').classList.toggle('active', f === 'all');
  document.getElementById('filter-marked').classList.toggle('active', f === 'marked');
  stopAudio();
  renderQA(currentChapter);
}

function getFilteredItems() {
  const raw = currentChapter === -1 ? qaData.flat() : qaData[currentChapter];
  if (currentFilter === 'marked') {
    // グローバルインデックスでフィルタ
    const flat = qaData.flat();
    return raw.filter(item => {
      const gi = flat.indexOf(item);
      return markedSet.has(gi);
    });
  }
  return raw;
}

// ========== タブ・チャプター ==========
function showTab(name, btn) {
  document.getElementById('tab-summary').style.display = name === 'summary' ? '' : 'none';
  document.getElementById('tab-qa').style.display = name === 'qa' ? '' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (name !== 'qa') stopAudio();
}

function buildSummaryChips() {
  document.getElementById('summary-chips').innerHTML = summaries.map((s, i) =>
    `<button class="chip${i===0?' active':''}" onclick="selectSummary(${i}, this)">${chapterLabels[i]}</button>`
  ).join('');
}

function selectSummary(i, btn) {
  document.querySelectorAll('#summary-chips .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderSummary(i);
}

function renderSummary(i) {
  const s = summaries[i];
  document.getElementById('summary-content').innerHTML = `
    <div class="summary-card">
      <h2>${s.title}</h2>
      <p class="summary-text">${s.text}</p>
      <div class="keywords">${s.keywords.map(k=>`<span class="kw">${k}</span>`).join('')}</div>
    </div>
  `;
}

function buildQAChips() {
  document.getElementById('qa-chips').innerHTML =
    `<button class="chip active" onclick="selectQA(-1, this)">全章</button>` +
    chapterLabels.map((l, i) =>
      `<button class="chip" onclick="selectQA(${i}, this)">${l}</button>`
    ).join('');
}

function selectQA(i, btn) {
  document.querySelectorAll('#qa-chips .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  currentChapter = i;
  stopAudio();
  renderQA(i);
}

function renderQA(chapterIdx) {
  const flat = qaData.flat();
  const items = getFilteredItems();
  document.getElementById('total-q').textContent = items.length;
  document.getElementById('shown-q').textContent = 0;
  // 単元内のマーク数を計算
  const flat = qaData.flat();
  const chapterItems = currentChapter === -1 ? flat : qaData[currentChapter];
  const chapterMarkedCount = chapterItems.filter(item => markedSet.has(flat.indexOf(item))).length;
  document.getElementById('marked-q').textContent = chapterMarkedCount;

  const mapSrc = document.getElementById('map-img') ? document.getElementById('map-img').src : '';

  document.getElementById('qa-content').innerHTML = items.map((item, di) => {
    const gi = flat.indexOf(item); // グローバルインデックス
    const isEssay = item.type === 'essay';
    const isMarked = markedSet.has(gi);
    const numCls = isEssay ? 'qa-q-num essay-num' : 'qa-q-num';
    const tag = `<span class="qa-tag ${typeTagClass[item.type]}">${typeLabel[item.type]}</span>`;
    const ansCls = isEssay ? 'qa-answer essay-ans' : 'qa-answer';
    const mapHtml = item.map ? `<img src="${mapSrc}" style="width:100%;max-width:480px;border-radius:8px;margin-top:8px;display:block;">` : '';
    return `
      <div class="qa-item${isEssay?' essay':''}${isMarked?' marked-card':''}" id="qa-card-${di}">
        <div class="qa-q">
          <button class="mark-btn${isMarked?' marked':''}" onclick="toggleMark(${gi}, ${di})" title="マーク">⭐</button>
          <span class="${numCls}">Q${di+1}</span>${tag}${item.q}${mapHtml}
        </div>
        <button class="ans-btn" onclick="toggleAnswer(${di}, this)">答えを見る</button>
        <div class="${ansCls}" id="ans-${di}">${item.a}</div>
      </div>`;
  }).join('');

  updateAudioUI();
}

function toggleMark(gi, di) {
  if (markedSet.has(gi)) {
    markedSet.delete(gi);
  } else {
    markedSet.add(gi);
  }
  saveMarks();
  // カードのスタイルだけ更新（再描画なし）
  const card = document.getElementById('qa-card-' + di);
  const btn = card ? card.querySelector('.mark-btn') : null;
  if (card) card.classList.toggle('marked-card', markedSet.has(gi));
  if (btn) btn.classList.toggle('marked', markedSet.has(gi));
  // 単元内マーク数を再計算して表示
  const flat = qaData.flat();
  const chapterItems = currentChapter === -1 ? flat : qaData[currentChapter];
  const chapterMarkedCount = chapterItems.filter(item => markedSet.has(flat.indexOf(item))).length;
  document.getElementById('marked-q').textContent = chapterMarkedCount;
}

function toggleAnswer(i, btn) {
  const el = document.getElementById('ans-'+i);
  btn.textContent = el.classList.toggle('show') ? '隠す' : '答えを見る';
  updateScore();
}

function updateScore() {
  document.getElementById('shown-q').textContent =
    document.querySelectorAll('.qa-answer.show').length;
}

function revealAll() {
  document.querySelectorAll('.qa-answer').forEach(el => el.classList.add('show'));
  document.querySelectorAll('.ans-btn').forEach(btn => btn.textContent = '隠す');
  updateScore();
}

function hideAll() {
  document.querySelectorAll('.qa-answer').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.ans-btn').forEach(btn => btn.textContent = '答えを見る');
  updateScore();
}

buildSummaryChips();
renderSummary(0);
buildQAChips();
renderQA(-1);
</script>
