<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中学英語リスニング</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --text-sub: #666;
    --text-hint: #999;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-mid: #378ADD;
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header h1 {
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  header p {
    font-size: 13px;
    color: var(--text-hint);
    margin-top: 4px;
  }

  .grade-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .grade-tab {
    flex: 1;
    padding: 10px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .grade-tab:hover { border-color: var(--blue-mid); color: var(--blue); }
  .grade-tab.active {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
  }

  .cat-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .cat-tab {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-tab:hover { border-color: var(--blue-mid); color: var(--blue); }
  .cat-tab.active {
    background: var(--blue-light);
    border-color: var(--blue-mid);
    color: var(--blue);
    font-weight: 500;
  }

  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-sub);
  }
  .score-val {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .reset-btn {
    font-size: 12px;
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: none;
    color: var(--text-sub);
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
  }
  .reset-btn:hover { background: var(--bg); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px 20px;
    margin-bottom: 14px;
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .q-cat {
    font-size: 11px;
    font-weight: 500;
    color: var(--blue);
    background: var(--blue-light);
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: 0.5px;
  }
  .q-num {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--text-hint);
  }

  .listen-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 16px 18px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 20px;
    transition: all 0.2s;
    text-align: left;
  }
  .listen-btn:hover { border-color: var(--blue-mid); background: var(--blue-light); color: var(--blue); }
  .listen-btn.playing {
    border-color: var(--blue-mid);
    background: var(--blue-light);
    color: var(--blue);
  }
  .listen-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .listen-btn.playing .listen-icon { background: var(--blue-mid); }
  .listen-icon svg { fill: #fff; width: 18px; height: 18px; }
  .listen-txt { font-size: 14px; }

  .choices { display: grid; gap: 8px; }
  .choice {
    padding: 13px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.5;
  }
  .choice:hover:not(:disabled) {
    border-color: var(--blue-mid);
    background: var(--blue-light);
    color: var(--blue);
  }
  .choice.correct {
    background: var(--green-light);
    border-color: #639922;
    color: var(--green);
    font-weight: 500;
  }
  .choice.wrong {
    background: var(--red-light);
    border-color: #E24B4A;
    color: var(--red);
  }
  .choice:disabled { cursor: default; }

  .result-area { margin-top: 16px; min-height: 32px; }
  .result-msg {
    text-align: center;
    font-size: 15px;
    font-weight: 500;
    padding: 8px;
  }
  .result-msg.ok { color: var(--green); }
  .result-msg.ng { color: var(--red); }

  .answer-reveal {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-sub);
    border-left: 3px solid var(--blue-mid);
  }
  .answer-reveal span {
    color: var(--text);
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    font-weight: 500;
  }

  .nav-row {
    display: flex;
    gap: 8px;
  }
  .nav-btn {
    flex: 1;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--bg); }
  .nav-btn.primary {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
  }
  .nav-btn.primary:hover { background: #0C447C; border-color: #0C447C; }

  @media (max-width: 480px) {
    body { padding: 16px 12px 40px; }
    .card { padding: 20px 16px 16px; }
    header h1 { font-size: 19px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎧 中学英語リスニング</h1>
    <p>音声を聞いて正しい日本語訳を選ぼう</p>
  </header>

  <div class="grade-tabs">
    <button class="grade-tab active" onclick="setGrade(1)">中学1年</button>
    <button class="grade-tab" onclick="setGrade(2)">中学2年</button>
    <button class="grade-tab" onclick="setGrade(3)">中学3年</button>
  </div>

  <div class="cat-tabs" id="catTabs"></div>

  <div class="score-bar">
    <span>正解数</span>
    <span class="score-val" id="scoreDisp">0 / 0</span>
    <button class="reset-btn" onclick="resetScore()">リセット</button>
  </div>

  <div class="card">
    <div class="q-meta">
      <span class="q-cat" id="qLabel">単語</span>
      <span class="q-num" id="qNum">問題 1 / 10</span>
    </div>
    <button class="listen-btn" id="listenBtn" onclick="speak()">
      <span class="listen-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </span>
      <span class="listen-txt" id="listenTxt">タップして音声を再生</span>
    </button>
    <div class="choices" id="choices"></div>
    <div class="result-area">
      <div class="result-msg" id="resultMsg"></div>
      <div class="answer-reveal" id="answerReveal" style="display:none;"></div>
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="prevQ()">← 前へ</button>
    <button class="nav-btn primary" onclick="nextQ()">次へ →</button>
  </div>
</div>

const CATEGORIES = ["単語","熟語","会話表現","文法"];
let grade = 1, cat = "単語", qIdx = 0, answered = false;
let score = 0, total = 0;
const synth = window.speechSynthesis;
let currentQ = null;

function setGrade(g) {
  grade = g;
  document.querySelectorAll('.grade-tab').forEach((t,i) => t.classList.toggle('active', i === g-1));
  qIdx = 0; answered = false;
  renderCatTabs(); loadQ();
}
function setCat(c) {
  cat = c; qIdx = 0; answered = false;
  renderCatTabs(); loadQ();
}
function renderCatTabs() {
  document.getElementById('catTabs').innerHTML = CATEGORIES.map(c =>
    `<button class="cat-tab${c===cat?' active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}
function getQuestions() { return DATA[grade][cat]; }
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function loadQ() {
  const qs = getQuestions();
  currentQ = qs[qIdx % qs.length];
  answered = false;
  document.getElementById('qLabel').textContent = cat;
  document.getElementById('qNum').textContent = `問題 ${(qIdx % qs.length)+1} / ${qs.length}`;
  const btn = document.getElementById('listenBtn');
  btn.className = 'listen-btn';
  document.getElementById('listenTxt').textContent = 'タップして音声を再生';
  document.getElementById('resultMsg').textContent = '';
  document.getElementById('resultMsg').className = 'result-msg';
  document.getElementById('answerReveal').style.display = 'none';
  const shuffled = shuffle(currentQ.choices);
  currentQ._shuffled = shuffled;
  const container = document.getElementById('choices');
  container.innerHTML = shuffled.map((c, i) =>
    `<button class="choice" data-idx="${i}">${c}</button>`
  ).join('');
  container.querySelectorAll('.choice').forEach(btn => {
    btn.addEventListener('click', () => answer(btn, parseInt(btn.dataset.idx)));
  });
  updateScore();
}

function speak() {
  if (!currentQ) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(currentQ.en);
  utt.lang = 'en-US';
  utt.rate = 0.85;
  const btn = document.getElementById('listenBtn');
  btn.className = 'listen-btn playing';
  document.getElementById('listenTxt').textContent = '再生中...';
  utt.onend = () => { btn.className = 'listen-btn'; document.getElementById('listenTxt').textContent = 'もう一度再生する'; };
  utt.onerror = () => { btn.className = 'listen-btn'; document.getElementById('listenTxt').textContent = 'タップして音声を再生'; };
  synth.speak(utt);
}

function answer(btn, idx) {
  if (answered) return;
  answered = true;
  total++;
  const chosen = currentQ._shuffled[idx];
  const correct = currentQ.ja;
  document.querySelectorAll('.choice').forEach((b, i) => {
    b.disabled = true;
    if (currentQ._shuffled[i] === correct) b.className = 'choice correct';
  });
  const msg = document.getElementById('resultMsg');
  if (chosen === correct) {
    score++;
    btn.className = 'choice correct';
    msg.textContent = '⭕ 正解！';
    msg.className = 'result-msg ok';
  } else {
    btn.className = 'choice wrong';
    msg.textContent = '❌ 不正解';
    msg.className = 'result-msg ng';
    const rev = document.getElementById('answerReveal');
    rev.innerHTML = `英文: <span>${currentQ.en}</span>`;
    rev.style.display = 'block';
  }
  updateScore();
}

function prevQ() {
  synth.cancel();
  const len = getQuestions().length;
  qIdx = (qIdx - 1 + len) % len;
  loadQ();
}
function nextQ() {
  synth.cancel();
  const len = getQuestions().length;
  qIdx = (qIdx + 1) % len;
  loadQ();
}
function resetScore() { score = 0; total = 0; updateScore(); }
function updateScore() {
  document.getElementById('scoreDisp').textContent = `${score} / ${total}`;
}

renderCatTabs();
loadQ();
</script>
