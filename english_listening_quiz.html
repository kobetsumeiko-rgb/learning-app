<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語リスニング練習</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink: #FF6B9D;
  --pink-light: #FFE0ED;
  --pink-pale: #FFF0F6;
  --lavender: #C084FC;
  --lavender-light: #EDE9FE;
  --mint: #34D399;
  --mint-light: #D1FAE5;
  --yellow: #FBBF24;
  --yellow-light: #FEF3C7;
  --red: #F43F5E;
  --red-light: #FFE4E6;
  --text: #3D2B4F;
  --text-sub: #9D7BB0;
  --text-hint: #C4A8D4;
  --surface: #FFFFFF;
  --bg: #FDF4FF;
  --border: rgba(192,132,252,0.2);
  --radius: 20px;
  --radius-sm: 14px;
  --shadow: 0 4px 20px rgba(192,132,252,0.15);
  --shadow-sm: 0 2px 10px rgba(192,132,252,0.1);
}

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px 16px 60px;
  position: relative;
  overflow-x: hidden;
}

/* 背景デコ */
body::before {
  content: '';
  position: fixed;
  top: -120px; right: -120px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,107,157,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -100px; left: -100px;
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(192,132,252,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 540px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* ヘッダー */
header {
  text-align: center;
  margin-bottom: 24px;
  padding: 24px 20px 20px;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 2px solid rgba(255,107,157,0.15);
  position: relative;
  overflow: hidden;
}
header::before {
  content: '✦';
  position: absolute; top: 10px; left: 16px;
  font-size: 18px; color: var(--pink); opacity: 0.4;
}
header::after {
  content: '✦';
  position: absolute; top: 10px; right: 16px;
  font-size: 18px; color: var(--lavender); opacity: 0.4;
}
.header-emoji { font-size: 36px; display: block; margin-bottom: 6px; }
header h1 {
  font-family: 'Nunito', 'Zen Maru Gothic', sans-serif;
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--pink), var(--lavender));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.5px;
}
header p {
  font-size: 12px;
  color: var(--text-hint);
  margin-top: 4px;
}

/* 学年タブ */
.grade-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.grade-tab {
  flex: 1;
  padding: 10px 6px;
  border: 2px solid var(--border);
  border-radius: 999px;
  background: var(--surface);
  color: var(--text-sub);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
}
.grade-tab:hover { border-color: var(--pink); color: var(--pink); transform: translateY(-1px); }
.grade-tab.active {
  background: linear-gradient(135deg, var(--pink), var(--lavender));
  border-color: transparent;
  color: #fff;
  box-shadow: 0 4px 14px rgba(255,107,157,0.35);
  transform: translateY(-2px);
}

/* カテゴリタブ */
.cat-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.cat-tab {
  padding: 6px 14px;
  border: 2px solid var(--border);
  border-radius: 999px;
  background: var(--surface);
  color: var(--text-sub);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.cat-tab:hover { border-color: var(--lavender); color: var(--lavender); }
.cat-tab.active {
  background: var(--lavender-light);
  border-color: var(--lavender);
  color: #7C3AED;
}

/* スコアバー */
.score-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.score-label { font-size: 12px; color: var(--text-sub); font-weight: 700; }
.score-val {
  font-family: 'Nunito', sans-serif;
  font-size: 20px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--pink), var(--lavender));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.reset-btn {
  font-size: 11px;
  padding: 5px 12px;
  border: 2px solid var(--border);
  border-radius: 999px;
  background: none;
  color: var(--text-sub);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.reset-btn:hover { border-color: var(--pink); color: var(--pink); }

/* メインカード */
.card {
  background: var(--surface);
  border: 2px solid rgba(255,107,157,0.12);
  border-radius: var(--radius);
  padding: 22px 18px 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--pink), var(--lavender), var(--mint));
}

/* 問題メタ */
.q-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.q-cat {
  font-size: 11px;
  font-weight: 700;
  color: white;
  background: linear-gradient(135deg, var(--pink), var(--lavender));
  padding: 4px 12px;
  border-radius: 999px;
  letter-spacing: 0.5px;
}
.q-num {
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-hint);
}

/* 再生速度 */
.speed-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
}
.speed-label { font-size: 11px; color: var(--text-hint); font-weight: 700; }
.speed-btn {
  padding: 4px 12px;
  border: 2px solid var(--border);
  border-radius: 999px;
  background: var(--surface);
  color: var(--text-sub);
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.15s;
}
.speed-btn:hover { border-color: var(--pink); color: var(--pink); }
.speed-btn.active {
  background: var(--pink-light);
  border-color: var(--pink);
  color: var(--pink);
}

/* 再生ボタン */
.listen-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 16px 18px;
  border: 2.5px dashed rgba(255,107,157,0.35);
  border-radius: var(--radius-sm);
  background: var(--pink-pale);
  color: var(--pink);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 18px;
  transition: all 0.2s;
  text-align: left;
}
.listen-btn:hover {
  border-style: solid;
  border-color: var(--pink);
  background: var(--pink-light);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(255,107,157,0.2);
}
.listen-btn.playing {
  border-style: solid;
  border-color: var(--pink);
  background: var(--pink-light);
  animation: pulse-pink 1.2s ease-in-out infinite;
}
@keyframes pulse-pink {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,157,0.3); }
  50% { box-shadow: 0 0 0 8px rgba(255,107,157,0); }
}
.listen-icon {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), #FF8FAB);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(255,107,157,0.35);
}
.listen-icon svg { fill: #fff; width: 20px; height: 20px; }

/* 選択肢 */
.choices { display: grid; gap: 9px; }
.choice {
  padding: 13px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 14px;
  font-weight: 500;
  text-align: left;
  cursor: pointer;
  transition: all 0.18s;
  line-height: 1.5;
  position: relative;
}
.choice:hover:not(:disabled) {
  border-color: var(--lavender);
  background: var(--lavender-light);
  color: #6D28D9;
  transform: translateX(4px);
}
.choice.correct {
  background: var(--mint-light);
  border-color: var(--mint);
  color: #065F46;
  font-weight: 700;
}
.choice.correct::after {
  content: '✓';
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 16px; color: var(--mint); font-weight: 900;
}
.choice.wrong {
  background: var(--red-light);
  border-color: var(--red);
  color: var(--red);
}
.choice.wrong::after {
  content: '✗';
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 16px; font-weight: 900;
}
.choice:disabled { cursor: default; transform: none; }

/* 結果 */
.result-area { margin-top: 14px; min-height: 32px; }
.result-msg {
  text-align: center;
  font-size: 18px;
  font-weight: 700;
  padding: 8px;
  font-family: 'Nunito', 'Zen Maru Gothic', sans-serif;
}
.result-msg.ok {
  color: var(--mint);
  animation: pop 0.3s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.result-msg.ng {
  color: var(--red);
  animation: shake 0.35s ease-in-out;
}
@keyframes pop {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* 答え表示 */
.answer-reveal {
  margin-top: 10px;
  padding: 12px 16px;
  background: linear-gradient(135deg, #FFF9F0, #FFF0F9);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-sub);
  border: 2px solid rgba(255,107,157,0.15);
  line-height: 1.8;
}
.answer-reveal span { color: var(--text); font-weight: 700; }

/* ポイント */
.point-box {
  margin-top: 10px;
  padding: 12px 16px;
  background: var(--yellow-light);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: #78350F;
  border: 2px solid rgba(251,191,36,0.4);
  line-height: 1.7;
}
.point-box strong { color: #92400E; font-weight: 700; }

/* ナビ */
.nav-row { display: flex; gap: 10px; }
.nav-btn {
  flex: 1;
  padding: 13px;
  border: 2.5px solid var(--border);
  border-radius: 999px;
  background: var(--surface);
  color: var(--text-sub);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
}
.nav-btn:hover { border-color: var(--lavender); color: var(--lavender); transform: translateY(-2px); }
.nav-btn.primary {
  background: linear-gradient(135deg, var(--pink), var(--lavender));
  border-color: transparent;
  color: #fff;
  box-shadow: 0 4px 16px rgba(255,107,157,0.35);
}
.nav-btn.primary:hover {
  box-shadow: 0 6px 22px rgba(255,107,157,0.45);
  transform: translateY(-2px);
}

/* デコ浮かぶ花 */
.deco {
  position: fixed;
  font-size: 20px;
  opacity: 0.18;
  pointer-events: none;
  z-index: 0;
  animation: float 6s ease-in-out infinite;
}
.deco:nth-child(1) { top: 8%; left: 4%; animation-delay: 0s; }
.deco:nth-child(2) { top: 20%; right: 5%; animation-delay: 1.5s; font-size: 14px; }
.deco:nth-child(3) { top: 55%; left: 2%; animation-delay: 3s; font-size: 16px; }
.deco:nth-child(4) { top: 70%; right: 3%; animation-delay: 0.8s; }
.deco:nth-child(5) { top: 88%; left: 8%; animation-delay: 2s; font-size: 12px; }
@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-12px) rotate(8deg); }
}

@media (max-width: 480px) {
  body { padding: 14px 12px 50px; }
  .card { padding: 18px 14px 14px; }
  header h1 { font-size: 19px; }
}
</style>
</head>
<body>

<span class="deco">🌸</span>
<span class="deco">⭐</span>
<span class="deco">🌷</span>
<span class="deco">✨</span>
<span class="deco">🍬</span>

<div class="container">
  <header>
    <span class="header-emoji">🎧</span>
    <h1>英語リスニング練習</h1>

  <div class="grade-tabs">

  <div class="card">

    <div class="choices" id="choices"></div>
    <div class="result-area">
      <div class="result-msg" id="resultMsg"></div>
      <div class="answer-reveal" id="answerReveal" style="display:none;"></div>
      <div class="point-box" id="pointBox" style="display:none;"></div>
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="prevQ()">← 前へ</button>
    <button class="nav-btn primary" onclick="nextQ()">次へ →</button>
  </div>
</div>

const CATEGORIES = ["単語","熟語","会話表現","文法"];
let grade = 1, cat = "単語", qIdx = 0, answered = false;
let score = 0, total = 0;
const synth = window.speechSynthesis;
let currentQ = null;
let currentSpeakEN = "";
let speakRate = 1.0;
function setSpeed(btn) {
  speakRate = parseFloat(btn.dataset.rate);
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b === btn));
}

function setGrade(g) {
  grade = g;
  document.querySelectorAll('.grade-tab').forEach((t,i) => t.classList.toggle('active', i === g-1));
  qIdx = 0; answered = false;
  renderCatTabs(); loadQ();
}
function setCat(c) {
  cat = c; qIdx = 0; answered = false;
  renderCatTabs(); loadQ();
}
function renderCatTabs() {
  document.getElementById('catTabs').innerHTML = CATEGORIES.map(c =>
    `<button class="cat-tab${c===cat?' active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}
function getQuestions() { return DATA[grade][cat]; }
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function loadQ() {
  const qs = getQuestions();
  currentQ = qs[qIdx % qs.length];
  answered = false;
  document.getElementById('qLabel').textContent = cat;
  document.getElementById('qNum').textContent = `問題 ${(qIdx % qs.length)+1} / ${qs.length}`;
  const btn = document.getElementById('listenBtn');
  btn.className = 'listen-btn';
  document.getElementById('listenTxt').textContent = 'タップして音声を再生';
  document.getElementById('resultMsg').textContent = '';
  document.getElementById('resultMsg').className = 'result-msg';
  document.getElementById('answerReveal').style.display = 'none';
  document.getElementById('pointBox').style.display = 'none';

  // 4択をシャッフルし、そのうちランダム1つの英文を音声用に選ぶ
  const shuffled = shuffle(currentQ.choices);
  currentQ._shuffled = shuffled;
  // 音声で流す英文：シャッフル後の先頭をランダムに選ぶ（毎回変わる）
  currentSpeakEN = shuffled[Math.floor(Math.random() * shuffled.length)].en;

  const container = document.getElementById('choices');
  container.innerHTML = shuffled.map((c, i) =>
    `<button class="choice" data-idx="${i}">${c.ja}</button>`
  ).join('');
  container.querySelectorAll('.choice').forEach(btn => {
    btn.addEventListener('click', () => answer(btn, parseInt(btn.dataset.idx)));
  });
  updateScore();
}

function speak() {
  if (!currentSpeakEN) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(currentSpeakEN);
  utt.lang = 'en-US';
  utt.rate = speakRate;
  const btn = document.getElementById('listenBtn');
  btn.className = 'listen-btn playing';
  document.getElementById('listenTxt').textContent = '再生中...';
  utt.onend = () => { btn.className = 'listen-btn'; document.getElementById('listenTxt').textContent = 'もう一度再生する'; };
  utt.onerror = () => { btn.className = 'listen-btn'; document.getElementById('listenTxt').textContent = 'タップして音声を再生'; };
  synth.speak(utt);
}

function answer(btn, idx) {
  if (answered) return;
  answered = true;
  total++;
  const chosen = currentQ._shuffled[idx];
  // 正解判定：音声で流れた英文と選んだ選択肢の英文が一致するか
  const isCorrect = (chosen.en === currentSpeakEN);

  document.querySelectorAll('.choice').forEach((b, i) => {
    b.disabled = true;
    if (currentQ._shuffled[i].en === currentSpeakEN) b.className = 'choice correct';
  });

  const msg = document.getElementById('resultMsg');
  const correctChoice = currentQ._shuffled.find(c => c.en === currentSpeakEN);
  const rev = document.getElementById('answerReveal');
  rev.innerHTML = `<div style="margin-bottom:5px;">✅ 正解: <span>${currentSpeakEN}</span>　${correctChoice ? correctChoice.ja : ''}</div>`;
  if (!isCorrect) {
    rev.innerHTML += `<div style="margin-top:4px;">❌ あなたの答え: <span style="color:var(--red)">${chosen.en}</span>　${chosen.ja}</div>`;
  }
  rev.style.display = 'block';

  // ポイント表示
  const pb = document.getElementById('pointBox');
  if (currentQ.point && currentQ.point.en) {
    pb.innerHTML = `💡 <strong>ポイント：</strong>${currentQ.point.en}　<span style="color:#7A5C00;font-size:12px;">（${currentQ.point.ja}）</span>`;
    pb.style.display = 'block';
  } else {
    pb.style.display = 'none';
  }

  if (isCorrect) {
    score++;
    btn.className = 'choice correct';
    msg.textContent = '⭕ 正解！';
    msg.className = 'result-msg ok';
  } else {
    btn.className = 'choice wrong';
    msg.textContent = '❌ 不正解';
    msg.className = 'result-msg ng';
  }
  updateScore();
}

function prevQ() {
  synth.cancel();
  const len = getQuestions().length;
  qIdx = (qIdx - 1 + len) % len;
  loadQ();
}
function nextQ() {
  synth.cancel();
  const len = getQuestions().length;
  qIdx = (qIdx + 1) % len;
  loadQ();
}
function resetScore() { score = 0; total = 0; updateScore(); }
function updateScore() {
  document.getElementById('scoreDisp').textContent = `${score} / ${total}`;
}

renderCatTabs();
loadQ();
</script>
</body>
</html>
